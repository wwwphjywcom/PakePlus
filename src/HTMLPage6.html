<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 英语智能学习系统</title>
    <style>
        /* ===== 全局样式 ===== */
        :root {
            --primary: #4a6fa5;
            --primary-dark: #3a5f95;
            --primary-light: #6b8cbc;
            --text: #1a2332;
            --text-light: #6b7a8f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --sentence-size: 1.8em;
            --phonetic-size: 1.3em;
            --meaning-size: 1em;
            --highlight-color: #ffeb3b;
            --highlight-text: #1a2332;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 12px;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* ===== 顶部 ===== */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .app-header .logo {
                font-size: 18px;
                font-weight: 700;
            }

                .app-header .logo span {
                    font-size: 24px;
                    margin-right: 4px;
                }

            .app-header .header-actions {
                display: flex;
                gap: 8px;
            }

                .app-header .header-actions button {
                    background: rgba(255,255,255,0.2);
                    border: none;
                    color: #fff;
                    padding: 6px 14px;
                    border-radius: 20px;
                    font-size: 13px;
                    cursor: pointer;
                }

        /* ===== 统计 ===== */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            box-shadow: var(--shadow);
        }

            .stat-card .number {
                font-size: 20px;
                font-weight: 700;
                color: var(--primary);
            }

            .stat-card .label {
                font-size: 10px;
                color: var(--text-light);
                margin-top: 2px;
            }

        /* ===== 打卡 ===== */
        .checkin-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

            .checkin-bar .stars {
                display: flex;
                gap: 3px;
                font-size: 20px;
            }

                .checkin-bar .stars .done {
                    opacity: 1;
                }

                .checkin-bar .stars .todo {
                    opacity: 0.25;
                }

            .checkin-bar .info {
                font-size: 12px;
                color: var(--text-light);
                flex: 1;
            }

            .checkin-bar .check-btn {
                background: #4caf50;
                color: #fff;
                border: none;
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }

                .checkin-bar .check-btn:disabled {
                    opacity: 0.5;
                    cursor: not-allowed;
                }

        /* ===== API查询 ===== */
        .api-query {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }

            .api-query .row {
                display: flex;
                gap: 8px;
            }

            .api-query input {
                flex: 1;
                padding: 10px 14px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 16px;
            }

            .api-query button {
                padding: 10px 18px;
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                white-space: nowrap;
            }

        .api-result {
            padding: 10px;
            background: #f8faff;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 14px;
            max-height: 150px;
            overflow-y: auto;
        }

            .api-result .word {
                font-weight: 700;
                font-size: 18px;
                color: var(--primary);
            }

            .api-result .phonetic {
                color: var(--text-light);
                font-family: "Times New Roman", serif;
            }

            .api-result .pos {
                font-weight: 600;
                color: #2c3e50;
                margin-right: 6px;
            }

            .api-result .source {
                font-size: 12px;
                color: #999;
                margin-top: 4px;
            }

        /* ===== 学习内容 ===== */
        .learning-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

            .learning-area .section-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--primary);
                margin-bottom: 12px;
                padding-bottom: 8px;
                border-bottom: 2px solid var(--bg);
            }

                .learning-area .section-title .badge {
                    font-size: 12px;
                    font-weight: 400;
                    color: var(--text-light);
                    margin-left: 8px;
                }

        /* ===== 句子块 ===== */
        .sentence-block {
            padding: 16px;
            border-left: 4px solid var(--primary-light);
            border-radius: 0 8px 8px 0;
            margin-bottom: 12px;
            background: #f8f9fa;
            transition: all 0.2s;
            position: relative;
        }

            .sentence-block.speaking {
                border-left-color: #ff9800;
                background: #fff8e1;
            }

            .sentence-block .speaking-indicator {
                display: none;
                position: absolute;
                top: 8px;
                right: 12px;
                font-size: 12px;
                color: #ff9800;
                animation: pulse-text 0.8s infinite;
            }

            .sentence-block.speaking .speaking-indicator {
                display: block;
            }

        @keyframes pulse-text {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .original {
            font-size: var(--sentence-size);
            font-weight: 700;
            color: var(--text);
            line-height: 1.8;
            word-break: break-word;
        }

        .phonetic {
            font-size: var(--phonetic-size);
            color: var(--text-light);
            margin: 4px 0 6px;
            font-family: "Times New Roman", serif;
            word-break: break-word;
        }

        .word-meaning {
            font-size: var(--meaning-size);
            color: var(--text);
            margin: 4px 0;
            word-break: break-word;
        }

        .sentence-meaning {
            font-size: var(--meaning-size);
            color: var(--text-light);
            margin: 4px 0 8px;
            font-style: italic;
        }

        /* ===== 朗读高亮 - 核心 ===== */
        .highlight-word {
            background: var(--highlight-color) !important;
            color: var(--highlight-text) !important;
            border-radius: 4px;
            padding: 0 3px;
            transition: all 0.15s ease;
            box-shadow: 0 0 12px rgba(255, 235, 59, 0.4);
            font-weight: 800 !important;
            transform: scale(1.05);
        }

        .highlight-phonetic {
            background: rgba(255, 235, 59, 0.4) !important;
            border-radius: 4px;
            padding: 0 3px;
            font-weight: 700 !important;
            color: #1a2332 !important;
            transition: all 0.15s ease;
        }

        .highlight-meaning {
            background: rgba(42, 157, 143, 0.25) !important;
            border-radius: 4px;
            padding: 0 3px;
            font-weight: 700 !important;
            color: #1a2332 !important;
            transition: all 0.15s ease;
        }

        /* 音节颜色（非高亮时保持） */
        .syllable-1 {
            color: #e63946;
        }

        .syllable-2 {
            color: #1d3557;
        }

        .syllable-3 {
            color: #1d6491;
        }

        .syllable-4 {
            color: #2a8008;
        }

        .syllable-5 {
            color: #d86b2a;
        }

        .syllable-6 {
            color: #2a9d8f;
        }

        .syllable-7 {
            color: #8e44ad;
        }

        .syllable-8 {
            color: #e67e22;
        }

        /* 高亮时覆盖颜色 */
        .highlight-word.syllable-1,
        .highlight-word.syllable-2,
        .highlight-word.syllable-3,
        .highlight-word.syllable-4,
        .highlight-word.syllable-5,
        .highlight-word.syllable-6,
        .highlight-word.syllable-7,
        .highlight-word.syllable-8 {
            color: var(--highlight-text) !important;
        }

        .unknown-word {
            text-decoration: underline wavy #e74c3c;
        }

        .unknown-phonetic {
            text-decoration: underline wavy #e74c3c;
        }

        /* ===== 单词列表 ===== */
        .word-list {
            margin-top: 10px;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .word-item {
            display: inline-block;
            padding: 4px 12px;
            background: #fff;
            border-radius: 16px;
            font-size: 13px;
            border: 1px solid #e0e0e0;
            white-space: nowrap;
            transition: all 0.2s;
        }

            .word-item.active-word {
                background: var(--highlight-color);
                border-color: #f57f17;
                transform: scale(1.1);
                box-shadow: 0 0 12px rgba(255, 235, 59, 0.5);
            }

            .word-item .word {
                font-weight: 700;
                color: #2c3e50;
            }

            .word-item .phonetic-small {
                color: #999;
                font-size: 11px;
                margin: 0 4px;
            }

            .word-item .meaning {
                color: var(--primary);
            }

        /* ===== 短语 ===== */
        .phrase-section {
            margin-top: 10px;
            padding: 10px 12px;
            background: #fef9e7;
            border-radius: 8px;
            border-left: 3px solid #f39c12;
        }

            .phrase-section .title {
                font-size: 12px;
                font-weight: 700;
                color: #e67e22;
                margin-bottom: 4px;
            }

        .phrase-item {
            display: flex;
            gap: 8px;
            font-size: 14px;
            padding: 2px 0;
            flex-wrap: wrap;
        }

            .phrase-item .en {
                font-weight: 600;
                color: #2c3e50;
            }

            .phrase-item .zh {
                color: #666;
            }

        /* ===== 控制 ===== */
        .sentence-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

            .sentence-controls button {
                padding: 6px 14px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
                font-size: 13px;
                transition: all 0.2s;
                background: #e8ecf1;
                color: #333;
                white-space: nowrap;
            }

                .sentence-controls button:active {
                    transform: scale(0.95);
                }

                .sentence-controls button.primary {
                    background: var(--primary);
                    color: #fff;
                }

                    .sentence-controls button.primary:hover {
                        background: var(--primary-dark);
                    }

                    .sentence-controls button.primary.speaking-btn {
                        background: #e74c3c;
                        animation: pulse-btn 1s infinite;
                    }

                .sentence-controls button.success {
                    background: #4caf50;
                    color: #fff;
                }

            .sentence-controls .nav-info {
                font-size: 13px;
                color: #999;
                margin: 0 6px;
            }

        @keyframes pulse-btn {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        /* ===== 进度条 ===== */
        .reading-progress {
            display: none;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

            .reading-progress.active {
                display: block;
            }

            .reading-progress .bar {
                height: 100%;
                background: linear-gradient(90deg, var(--primary), #ff9800);
                border-radius: 2px;
                transition: width 0.3s ease;
                width: 0%;
            }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--card-bg);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 6px 0 12px;
            border-top: 1px solid #eee;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            z-index: 100;
        }

            .bottom-nav .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                border: none;
                background: none;
                font-size: 10px;
                color: var(--text-light);
                cursor: pointer;
                padding: 4px 0;
            }

                .bottom-nav .nav-item .icon {
                    font-size: 22px;
                }

                .bottom-nav .nav-item.active {
                    color: var(--primary);
                    font-weight: 600;
                }

        /* ===== 设置 ===== */
        .settings-toggle {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 52px;
            height: 52px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(74,111,165,0.4);
            z-index: 50;
        }

            .settings-toggle:active {
                transform: scale(0.9);
            }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--card-bg);
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -4px 0 30px rgba(0,0,0,0.15);
        }

            .settings-panel.open {
                right: 0;
            }

            .settings-panel .close-btn {
                position: sticky;
                top: 0;
                background: var(--card-bg);
                padding: 8px 0;
                border: none;
                font-size: 24px;
                cursor: pointer;
                display: block;
                margin-left: auto;
                z-index: 5;
            }

            .settings-panel h2 {
                font-size: 18px;
                color: var(--primary);
                margin: 8px 0 16px;
                padding-bottom: 8px;
                border-bottom: 2px solid var(--bg);
            }

            .settings-panel .section-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--primary);
                margin: 16px 0 10px;
            }

            .settings-panel .form-group {
                margin-bottom: 12px;
            }

            .settings-panel label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: var(--text-light);
                margin-bottom: 3px;
            }

            .settings-panel select,
            .settings-panel input[type="text"],
            .settings-panel input[type="number"] {
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                background: #fafafa;
                height: 40px;
                appearance: auto;
                -webkit-appearance: menulist;
            }

            .settings-panel input[type="range"] {
                width: 100%;
            }

            .settings-panel .range-value {
                font-size: 13px;
                color: var(--primary);
                font-weight: 600;
            }

            .settings-panel .checkbox-group {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 4px 0;
            }

                .settings-panel .checkbox-group label {
                    margin: 0;
                    font-weight: 400;
                }

            .settings-panel .btn-primary {
                background: var(--primary);
                color: #fff;
                border: none;
                padding: 10px 16px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                width: 100%;
                margin-top: 4px;
            }

                .settings-panel .btn-primary:active {
                    background: var(--primary-dark);
                }

            .settings-panel .btn-danger {
                background: #e74c3c;
            }

                .settings-panel .btn-danger:active {
                    background: #c0392b;
                }

            .settings-panel .voice-setting {
                background: var(--bg);
                padding: 8px 12px;
                border-radius: 8px;
                margin-bottom: 6px;
            }

            .settings-panel .voice-preview {
                font-size: 12px;
                color: var(--primary);
                cursor: pointer;
                padding: 2px 8px;
                border-radius: 12px;
                background: rgba(74,111,165,0.1);
                display: inline-block;
                margin-top: 4px;
            }

            .settings-panel .api-status {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                margin-left: 6px;
            }

                .settings-panel .api-status.online {
                    background: #4caf50;
                }

                .settings-panel .api-status.offline {
                    background: #e74c3c;
                }

                .settings-panel .api-status.checking {
                    background: #f39c12;
                    animation: pulse 0.8s infinite;
                }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ===== 遮罩 ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

            .overlay.show {
                opacity: 1;
                pointer-events: auto;
            }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.25s;
            max-width: 90%;
            white-space: nowrap;
        }

            .toast.show {
                opacity: 1;
            }

        .hidden {
            display: none !important;
        }

        /* ===== 加载 ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

            .loading .spinner {
                display: inline-block;
                width: 30px;
                height: 30px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid var(--primary);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .stats-cards {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }

            .stat-card .number {
                font-size: 16px;
            }

            .stat-card .label {
                font-size: 9px;
            }

            :root {
                --sentence-size: 1.5em;
                --phonetic-size: 1.1em;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部 ===== -->
    <header class="app-header">
        <div class="logo"><span>📚</span> 英语智能学习</div>
        <div class="header-actions">
            <button onclick="showToast('👤 个人中心')">👤</button>
            <button onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- ===== 统计 ===== -->
    <div class="stats-cards" id="statsCards">
        <div class="stat-card"><div class="number" id="wordCount">0</div><div class="label">📝 本地词汇</div></div>
        <div class="stat-card"><div class="number" id="sentenceCount">0</div><div class="label">💬 句子数</div></div>
        <div class="stat-card"><div class="number" id="studyDays">0</div><div class="label">🔥 连续学习</div></div>
        <div class="stat-card"><div class="number" id="todayProgress">0%</div><div class="label">📊 今日进度</div></div>
    </div>

    <!-- ===== 打卡 ===== -->
    <div class="checkin-bar">
        <div class="stars" id="starDisplay">
            <span class="done">⭐</span><span class="done">⭐</span><span class="done">⭐</span>
            <span class="todo">⭐</span><span class="todo">⭐</span><span class="todo">⭐</span><span class="todo">⭐</span>
        </div>
        <div class="info" id="checkinInfo">今日未打卡</div>
        <button class="check-btn" id="checkinBtn" onclick="doCheckin()">✅ 打卡</button>
    </div>

    <!-- ===== API查询 ===== -->
    <div class="api-query">
        <div class="row">
            <input type="text" id="apiWordInput" placeholder="输入单词查询音标和释义..." value="beautiful">
            <button onclick="queryWordUI()">🔍 查询</button>
        </div>
        <div class="api-result" id="apiResult">点击查询获取单词详情（本地词典优先）</div>
    </div>

    <!-- ===== 学习内容 ===== -->
    <div class="learning-area" id="learningArea">
        <div class="section-title">
            📖 学习内容
            <span class="badge" id="lessonTitle">输入英文内容学习</span>
        </div>
        <div id="lessonContent">
            <div class="loading"><div class="spinner"></div><p>请在设置中输入学习内容后点击处理</p></div>
        </div>
    </div>

    <!-- ===== 底部导航 ===== -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><span class="icon">🏠</span> 学习</button>
        <button class="nav-item" onclick="switchTab('vocab')"><span class="icon">📝</span> 生词本</button>
        <button class="nav-item" onclick="switchTab('write')"><span class="icon">✍️</span> 造句</button>
        <button class="nav-item" onclick="switchTab('stats')"><span class="icon">📊</span> 统计</button>

    <!-- ============================================================ -->
    <script src="phoneticDictionary.js"></script>
    <script src="meaningDictionary.js"></script>
    <script src="phraseDictionary.js"></script>

    <script>
        // ============================================================
        // 核心词典查询函数
        // ============================================================

        function getPhonetic(word) {
            var lower = word.toLowerCase();
            if (typeof phoneticDictionary !== 'undefined' && phoneticDictionary[lower]) {
                return phoneticDictionary[lower];
            }
            return null;
        }

        function getMeaning(word) {
            var lower = word.toLowerCase();
            if (typeof meaningDictionary !== 'undefined' && meaningDictionary[lower]) {
                return meaningDictionary[lower];
            }
            return null;
        }

        function getPhrase(text) {
            var lower = text.toLowerCase();
            var found = [];
            if (typeof phraseDictionary !== 'undefined') {
                for (var key in phraseDictionary) {
                    if (lower.indexOf(key) !== -1) {
                        found.push({ phrase: key, meaning: phraseDictionary[key] });
                    }
                }
            }
            return found;
        }

        function getBaseForm(word) {
            var lower = word.toLowerCase();
            if (typeof meaningDictionary !== 'undefined' && meaningDictionary[lower]) return lower;
            if (lower.endsWith('es')) { var b = lower.slice(0, -2); if (typeof meaningDictionary !== 'undefined' &&
                    meaningDictionary[b]) return b; }
            if (lower.endsWith('s') && lower.length > 1) { var b = lower.slice(0, -1); if (typeof meaningDictionary !==
                    'undefined' && meaningDictionary[b]) return b; }
            if (lower.endsWith('ies')) { var b = lower.slice(0, -3) + 'y'; if (typeof meaningDictionary !== 'undefined' &&
                    meaningDictionary[b]) return b; }
            if (lower.endsWith('ing')) { var b = lower.slice(0, -3); if (typeof meaningDictionary !== 'undefined' &&
                    meaningDictionary[b]) return b; }
            if (lower.endsWith('ed')) { var b = lower.slice(0, -2); if (typeof meaningDictionary !== 'undefined' &&
                    meaningDictionary[b]) return b; }
            var irregular = { 'children': 'child', 'men': 'man', 'women': 'woman', 'feet': 'foot', 'teeth': 'tooth',
                'mice': 'mouse', 'people': 'person', 'geese': 'goose', 'oxen': 'ox' };
            return irregular[lower] || null;
        }

        function getWordData(word) {
            var lower = word.toLowerCase();
            var phonetic = getPhonetic(lower);
            var meaning = getMeaning(lower);
            if (phonetic && meaning) {
                return { phonetic: phonetic, meaning: meaning, pos: '' };
            }
            if (phonetic && !meaning) {
                return { phonetic: phonetic, meaning: '未知词义', pos: '' };
            }
            if (!phonetic && meaning) {
                return { phonetic: '/' + lower + '/', meaning: meaning, pos: '' };
            }
            var base = getBaseForm(lower);
            if (base) {
                var p = getPhonetic(base);
                var m = getMeaning(base);
                if (p || m) {
                    var phoneticResult = p || '/' + lower + '/';
                    if (lower !== base && (lower.endsWith('s') || lower.endsWith('es'))) {
                        phoneticResult = adjustPluralPhonetic(phoneticResult);
                    }
                    return { phonetic: phoneticResult, meaning: m || '未知词义', pos: '' };
                }
            }
            return null;
        }

        function adjustPluralPhonetic(phonetic) {
            if (!phonetic) return null;
            var clean = phonetic.replace(/^\/|\/$/g, '');
            var last = clean.charAt(clean.length - 1);
            if (['p', 't', 'k', 'f', 'θ'].indexOf(last) !== -1) { return '/' + clean + 's/'; }
            if (['s', 'z', 'ʃ', 'ʒ', 'tʃ', 'dʒ'].some(function(e) { return clean.endsWith(e); })) { return '/' + clean +
                    'ɪz/'; }
            return '/' + clean + 'z/';
        }

        // ============================================================
        // 状态管理
        // ============================================================
        var state = {
            sentences: [],
            learned: [],
            vocabulary: [],
            checkinDays: 0,
            lastCheckinDate: null,
            todayChecked: false,
            voices: [],
            wordCache: {},
            isSpeaking: false,
            dictSize: 0,
            currentWord: '',
            currentSentenceIndex: -1,
            wordPositions: {}
        };

        // ============================================================
        // DOM 引用
        // ============================================================
        var $ = function(id) { return document.getElementById(id); };
        var contentEl = $('lessonContent');
        var toastEl = $('toast');

        // ============================================================
        // 高亮颜色
        // ============================================================
        function updateHighlightColor() {
            var color = $('highlightColor').value;
            document.documentElement.style.setProperty('--highlight-color', color);
            // 自动调整文字颜色
            var brightness = getColorBrightness(color);
            var textColor = brightness > 150 ? '#1a2332' : '#ffffff';
            document.documentElement.style.setProperty('--highlight-text', textColor);
        }

        function getColorBrightness(hex) {
            var r = parseInt(hex.slice(1, 3), 16);
            var g = parseInt(hex.slice(3, 5), 16);
            var b = parseInt(hex.slice(5, 7), 16);
            return (r * 299 + g * 587 + b * 114) / 1000;
        }

        // ============================================================
        // API查询
        // ============================================================
        function getApiSource() {
            return $('apiSource') ? $('apiSource').value : 'local';
        }

        function queryWord(word) {
            var lower = word.toLowerCase().trim();
            if (!lower) return Promise.resolve(null);
            var source = getApiSource();
            var cacheKey = source + '_' + lower;
            if (state.wordCache[cacheKey]) {
                return Promise.resolve(state.wordCache[cacheKey]);
            }
            var local = getWordData(lower);
            if (local) {
                local.source = 'local';
                state.wordCache[cacheKey] = local;
                return Promise.resolve(local);
            }
            if (source === 'local') {
                return Promise.resolve(null);
            }
            if (source === 'freedictionary') {
                return fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + lower)
                    .then(function(response) {
                        if (!response.ok) throw new Error('Word not found');
                        return response.json();
                    })
                    .then(function(data) {
                        if (!data || data.length === 0) return null;
                        var entry = data[0];
                        var phonetic = entry.phonetic || '';
                        if (!phonetic && entry.phonetics) {
                            var found = entry.phonetics.find(function(p) { return p.text; });
                            if (found) phonetic = found.text;
                        }
                        var meaning = '';
                        var pos = '';
                        if (entry.meanings && entry.meanings.length > 0) {
                            var first = entry.meanings[0];
                            pos = first.partOfSpeech || '';
                            if (first.definitions && first.definitions.length > 0) {
                                meaning = first.definitions[0].definition;
                            }
                        }
                        var result = { word: lower, phonetic: phonetic || '/' + lower + '/',
                            meaning: meaning || '未知词义', pos: pos || '', source: 'freedictionary' };
                        state.wordCache[cacheKey] = result;
                        return result;
                    })
                    .catch(function() { return null; });
            }
            if (source === 'deepseek') {
                var apiKey = $('deepseekKey') ? $('deepseekKey').value.trim() : '';
                if (!apiKey) { return Promise.resolve(null); }
                var apiUrl = $('deepseekUrl') ? $('deepseekUrl').value :
                'https://api.deepseek.com/v1/chat/completions';
                var model = $('deepseekModel') ? $('deepseekModel').value : 'deepseek-chat';
                var prompt = '请为英语单词 "' + lower + '" 提供以下信息，以JSON格式返回（只返回JSON）：\n' +
                    '{\n    "word": "' + lower + '",\n    "phonetic": "国际音标",\n    "meaning": "中文释义",\n    "pos": "词性"\n}';
                return fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: '你是一个英语词典助手，只返回JSON格式数据。' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.3,
                        max_tokens: 200
                    })
                }).then(function(response) {
                    if (!response.ok) { return response.text().then(function(text) { throw new Error('API错误: ' +
                            text); }); }
                    return response.json();
                }).then(function(data) {
                    var content = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0]
                        .message.content : '';
                    try {
                        var parsed = JSON.parse(content);
                        var result = { word: parsed.word || lower, phonetic: parsed.phonetic || '/' + lower + '/',
                            meaning: parsed.meaning || '未知词义', pos: parsed.pos || '', source: 'deepseek' };
                        state.wordCache[cacheKey] = result;
                        return result;
                    } catch (e) { return null; }
                }).catch(function() { return null; });
            }
            return Promise.resolve(null);
        }

        // ============================================================
        // 查询界面
        // ============================================================
        function queryWordUI() {
            var input = $('apiWordInput');
            var word = input.value.trim();
            if (!word) { showToast('请输入单词'); return; }
            var resultEl = $('apiResult');
            resultEl.innerHTML = '<span class="loader"></span> 查询中...';
            queryWord(word).then(function(result) {
                if (result) {
                    resultEl.innerHTML = '<div class="word">' + result.word +
                        '</div><div class="phonetic">' + result.phonetic +
                        '</div><div><span class="pos">' + (result.pos || '') + '</span>' + result.meaning +
                        '</div><div class="source">来源: ' + result.source + '</div>';
                    showToast('✅ 已查询: ' + result.word);
                } else {
                    resultEl.innerHTML = '<div style="color:#e74c3c;">❌ 未找到 "' + word + '" 的释义</div>';
                }
            }).catch(function(e) {
                resultEl.innerHTML = '<div style="color:#e74c3c;">❌ 查询失败</div>';
            });
        }

        // ============================================================
        // 处理内容
        // ============================================================
        function processContent() {
            var input = $('contentInput');
            if (!input) return;
            var text = input.value.trim();
            if (!text) { showToast('请输入学习内容'); return; }

            var lines = text.split(/\n+/).filter(function(s) { return s.trim(); });
            state.sentences = lines;
            var container = $('lessonContent');
            var html = '';
            var totalWords = 0;
            var unknownSet = {};
            var promises = [];

            for (var li = 0; li < lines.length; li++) {
                (function(lineIndex) {
                    var raw = lines[lineIndex];
                    var clean = raw.trim();
                    if (!clean) return;
                    var words = clean.match(/\b[a-zA-Z']+\b/g) || [];
                    var wordDataList = [];
                    var phoneticParts = [];
                    var meaningParts = [];
                    var unknownWords = [];

                    for (var wi = 0; wi < words.length; wi++) {
                        (function(word) {
                            promises.push(
                                queryWord(word).then(function(data) {
                                    if (data) {
                                        wordDataList.push(data);
                                        phoneticParts.push(data.phonetic || '/' + word + '/');
                                        meaningParts.push(word + ': ' + data.meaning);
                                        if (data.source === 'local' && !getWordData(word)) {
                                            unknownWords.push(word.toLowerCase());
                                            unknownSet[word.toLowerCase()] = true;
                                        }
                                    } else {
                                        unknownWords.push(word.toLowerCase());
                                        unknownSet[word.toLowerCase()] = true;
                                        phoneticParts.push('/' + word + '/');
                                        meaningParts.push(word + ': 未知');
                                    }
                                })
                            );
                        })(words[wi]);
                    }

                    Promise.all(promises).then(function() {
                        totalWords += words.length;
                        var phoneticStr = phoneticParts.join(' ');
                        var meaningStr = meaningParts.join('; ');
                        var phrases = getPhrase(clean);

                        var coloredOriginal = colorizeText(clean, unknownWords);
                        var coloredPhonetic = colorizePhonetics(phoneticStr, clean, unknownWords);
                        var coloredMeaning = colorizeMeanings(meaningStr, clean);

                        // 保存单词位置信息用于高亮
                        var wordList = words.map(function(w) { return w.toLowerCase(); });
                        state.wordPositions[lineIndex] = wordList;

                        var blockHtml = '<div class="sentence-block" id="block-' + lineIndex + '">' +
                            '<span class="speaking-indicator">🔊 朗读中...</span>' +
                            '<div class="original" id="original-' + lineIndex + '">' + coloredOriginal +
                            '</div>' +
                            '<div class="phonetic" id="phonetic-' + lineIndex + '">' + coloredPhonetic +
                            '</div>' +
                            '<div class="word-meaning" id="meaning-' + lineIndex + '">' + coloredMeaning +
                            '</div>' +
                            '<div class="sentence-meaning">' + generateTranslation(clean) + '</div>';

                        if (phrases.length > 0) {
                            blockHtml += '<div class="phrase-section"><div class="title">📌 短语解析</div>';
                            for (var pi = 0; pi < phrases.length; pi++) {
                                blockHtml += '<div class="phrase-item"><span class="en">' + phrases[pi]
                                    .phrase + '</span><span class="zh">' + phrases[pi].meaning +
                                    '</span></div>';
                            }
                            blockHtml += '</div>';
                        }

                        // 进度条
                        blockHtml += '<div class="reading-progress" id="progress-' + lineIndex + '">' +
                            '<div class="bar" id="progress-bar-' + lineIndex + '"></div></div>';

                        blockHtml += '<div class="sentence-controls">' +
                            '<button class="primary" id="speak-btn-' + lineIndex +
                            '" onclick="speakSentence(' + lineIndex +
                            ')">🔊 朗读</button>' +
                            '<button onclick="addWordToVocab(' + lineIndex +
                            ')">📝 添加生词</button>' +
                            '<span class="nav-info">' + (lineIndex + 1) + ' / ' + lines.length +
                            '</span>' +
                            '<button onclick="prevSentence()">◀</button>' +
                            '<button onclick="nextSentence()">▶</button>' +
                            '</div></div>';

                        html += blockHtml;

                        if (lineIndex === lines.length - 1) {
                            container.innerHTML = html;
                            updateStats();
                            applyDisplaySettings();
                            showToast('✅ 已加载 ' + lines.length + ' 个句子');
                        }
                    });
                })(li);
            }

            if (lines.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">请输入学习内容</div>';
            }

            updateDictSize();
        }

        // ============================================================
        // 文本渲染
        // ============================================================
        function splitSyllables(word) {
            var vowels = ['a', 'e', 'i', 'o', 'u', 'y'];
            var syls = [];
            var current = '';
            for (var i = 0; i < word.length; i++) {
                current += word[i];
                if (vowels.indexOf(word[i].toLowerCase()) !== -1 && i < word.length - 1 &&
                    vowels.indexOf(word[i + 1].toLowerCase()) === -1) {
                    syls.push(current);
                    current = '';
                }
            }
            if (current) syls.push(current);
            return syls.length > 0 ? syls : [word];
        }

        function colorizeText(text, unknownWords) {
            var parts = text.split(/(\s+|[^\w']+)/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < parts.length; i++) {
                var part = parts[i];
                if (!part) continue;
                if (/^\s+$/.test(part) || /[^\w']/.test(part)) {
                    result += part;
                    continue;
                }
                var isUnknown = unknownWords && unknownWords.indexOf(part.toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-word' : '';
                var syllables = splitSyllables(part);
                var colored = '';
                for (var si = 0; si < syllables.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + part +
                        '">' + syllables[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += colored;
            }
            return result;
        }

        function colorizePhonetics(phonetic, original, unknownWords) {
            if (!phonetic) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var phoneticParts = phonetic.split(/\s+/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= phoneticParts.length) break;
                var isUnknown = unknownWords && unknownWords.indexOf(words[i].toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-phonetic' : '';
                var clean = phoneticParts[i].replace(/^\/|\/$/g, '');
                var syls = splitSyllables(clean);
                var colored = '';
                for (var si = 0; si < syls.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + words[i] +
                        '">' + syls[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += '/' + colored + '/ ';
            }
            return result;
        }

        function colorizeMeanings(meanings, original) {
            if (!meanings) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var meaningList = meanings.split('; ');
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= meaningList.length) break;
                result += '<span class="syllable-' + colorIdx + '" data-word="' + words[i] + '">' + meaningList[i] +
                    '</span>; ';
                colorIdx = colorIdx % 8 + 1;
            }
            return result;
        }

        function generateTranslation(text) {
            var words = text.match(/\b[a-zA-Z']+\b/g) || [];
            var meanings = [];
            for (var i = 0; i < words.length; i++) {
                var data = getWordData(words[i]);
                if (data) meanings.push(data.meaning);
            }
            if (meanings.length === 0) return '📖 ' + text + ' (参考翻译)';
            var result = meanings.join(' ');
            if (result.length > 60) result = result.substring(0, 60) + '...';
            return '📖 ' + result;
        }

        // ============================================================
        // 语音合成 - 带高亮
        // ============================================================
        var synth = window.speechSynthesis;
        var currentUtterance = null;
        var isReadingAll = false;
        var queueIndex = 0;
        var highlightTimer = null;

        function getVoice(selectorId) {
            var select = $(selectorId);
            if (!select || select.value === 'auto') return null;
            for (var i = 0; i < state.voices.length; i++) {
                if (state.voices[i].name === select.value) return state.voices[i];
            }
            return null;
        }

        function speakText(text, voice, rate, onEnd, sentenceIndex) {
            if (!text) return;
            if (synth.speaking) synth.cancel();

            var utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = parseFloat($('speechRate').value) || 0.8;
            if (voice) utterance.voice = voice;

            currentUtterance = utterance;

            // 获取句子中的所有单词
            var words = text.match(/\b[a-zA-Z']+\b/g) || [];
            var wordIndex = 0;

            // 监听边界事件 - 实时高亮
            utterance.onboundary = function(event) {
                if (event.name === 'word') {
                    // 获取当前单词
                    var currentWord = text.substring(event.charIndex, event.charIndex + event.charLength);
                    // 清理标点
                    currentWord = currentWord.replace(/[^a-zA-Z']/g, '');
                    if (currentWord) {
                        highlightCurrentWord(currentWord, sentenceIndex);
                        // 更新进度
                        var progress = (wordIndex + 1) / words.length * 100;
                        updateProgress(sentenceIndex, progress);
                        wordIndex++;
                    }
                }
            };

            utterance.onend = function() {
                clearHighlights(sentenceIndex);
                updateProgress(sentenceIndex, 100);
                if (onEnd) onEnd();
            };

            utterance.onerror = function() {
                clearHighlights(sentenceIndex);
                if (onEnd) onEnd();
            };

            // 如果浏览器不支持 boundary 事件，用定时器作为备选
            var fallbackIndex = 0;
            var fallbackInterval = null;

            if (!('onboundary' in utterance)) {
                // 备选方案：根据语速估算单词间隔
                var wordDuration = 200 / (utterance.rate || 0.8);
                fallbackInterval = setInterval(function() {
                    if (fallbackIndex < words.length) {
                        highlightCurrentWord(words[fallbackIndex], sentenceIndex);
                        var progress = (fallbackIndex + 1) / words.length * 100;
                        updateProgress(sentenceIndex, progress);
                        fallbackIndex++;
                    } else {
                        clearInterval(fallbackInterval);
                    }
                }, wordDuration);
            }

            // 保存清理函数
            utterance._cleanup = function() {
                if (fallbackInterval) {
                    clearInterval(fallbackInterval);
                    fallbackInterval = null;
                }
            };

            synth.speak(utterance);
        }

        // ============================================================
        // 高亮当前单词 - 三行同步
        // ============================================================
        function highlightCurrentWord(word, sentenceIndex) {
            if (sentenceIndex === undefined || sentenceIndex < 0) return;

            // 清除之前的高亮
            clearHighlights(sentenceIndex);

            if (!word) return;

            var block = document.getElementById('block-' + sentenceIndex);
            if (!block) return;

            var wordLower = word.toLowerCase().replace(/[^a-z']/g, '');

            // 1. 高亮原句中的单词
            var originalEl = document.getElementById('original-' + sentenceIndex);
            if (originalEl) {
                var spans = originalEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < spans.length; i++) {
                    var span = spans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-word');
                    }
                }
            }

            // 2. 高亮音标中的对应部分
            var phoneticEl = document.getElementById('phonetic-' + sentenceIndex);
            if (phoneticEl) {
                var pSpans = phoneticEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < pSpans.length; i++) {
                    var span = pSpans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-phonetic');
                    }
                }
            }

            // 3. 高亮释义中的对应部分
            var meaningEl = document.getElementById('meaning-' + sentenceIndex);
            if (meaningEl) {
                var mSpans = meaningEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < mSpans.length; i++) {
                    var span = mSpans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-meaning');
                    }
                }
            }

            // 4. 高亮单词列表中的对应项
            var wordItems = block.querySelectorAll('.word-item');
            for (var i = 0; i < wordItems.length; i++) {
                var item = wordItems[i];
                var itemWord = item.querySelector('.word');
                if (itemWord) {
                    var text = itemWord.textContent.toLowerCase().replace(/[^a-z']/g, '');
                    if (text === wordLower) {
                        item.classList.add('active-word');
                    }
                }
            }

            // 更新当前状态
            state.currentWord = word;
            state.currentSentenceIndex = sentenceIndex;
        }

        // ============================================================
        // 清除高亮
        // ============================================================
        function clearHighlights(sentenceIndex) {
            if (sentenceIndex === undefined) {
                // 清除所有
                document.querySelectorAll('.highlight-word, .highlight-phonetic, .highlight-meaning, .active-word')
                    .forEach(function(el) {
                        el.classList.remove('highlight-word', 'highlight-phonetic', 'highlight-meaning',
                            'active-word');
                    });
                document.querySelectorAll('.sentence-block').forEach(function(el) {
                    el.classList.remove('speaking');
                });
                document.querySelectorAll('.reading-progress').forEach(function(el) {
                    el.classList.remove('active');
                });
                document.querySelectorAll('.primary.speaking-btn').forEach(function(el) {
                    el.classList.remove('speaking-btn');
                });
                return;
            }

            var block = document.getElementById('block-' + sentenceIndex);
            if (!block) return;

            block.querySelectorAll('.highlight-word, .highlight-phonetic, .highlight-meaning, .active-word')
                .forEach(function(el) {
                    el.classList.remove('highlight-word', 'highlight-phonetic', 'highlight-meaning',
                    'active-word');
                });

            block.classList.remove('speaking');
            var progress = document.getElementById('progress-' + sentenceIndex);
            if (progress) {
                progress.classList.remove('active');
                var bar = document.getElementById('progress-bar-' + sentenceIndex);
                if (bar) bar.style.width = '0%';
            }

            var btn = document.getElementById('speak-btn-' + sentenceIndex);
            if (btn) btn.classList.remove('speaking-btn');
        }

        // ============================================================
        // 更新进度
        // ============================================================
        function updateProgress(sentenceIndex, percent) {
            var bar = document.getElementById('progress-bar-' + sentenceIndex);
            var progress = document.getElementById('progress-' + sentenceIndex);
            if (bar) {
                bar.style.width = Math.min(100, percent) + '%';
            }
            if (progress && percent > 0 && percent < 100) {
                progress.classList.add('active');
            }
            if (percent >= 100) {
                progress.classList.remove('active');
            }
        }

        // ============================================================
        // 朗读句子
        // ============================================================
        function speakSentence(index) {
            if (index < 0 || index >= state.sentences.length) return;

            var sentence = state.sentences[index];
            if (!sentence) return;

            // 如果正在朗读，停止
            if (synth.speaking) {
                synth.cancel();
                clearHighlights(index);
            }

            // 标记当前句子正在朗读
            var blocks = document.querySelectorAll('.sentence-block');
            for (var bi = 0; bi < blocks.length; bi++) {
                blocks[bi].classList.remove('speaking');
                clearHighlights(bi);
            }

            var block = document.getElementById('block-' + index);
            if (block) {
                block.classList.add('speaking');
            }

            var btn = document.getElementById('speak-btn-' + index);
            if (btn) btn.classList.add('speaking-btn');

            var cleanText = sentence.trim();
            var voice = getVoice('defaultVoice');
            var rate = parseFloat($('speechRate').value) || 0.8;

            // 重置进度
            var bar = document.getElementById('progress-bar-' + index);
            if (bar) bar.style.width = '0%';

            speakText(cleanText, voice, rate, function() {
                // 朗读结束
                if (block) block.classList.remove('speaking');
                if (btn) btn.classList.remove('speaking-btn');
                clearHighlights(index);

                // 如果是朗读全部，继续下一句
                if (isReadingAll && queueIndex < state.sentences.length - 1) {
                    queueIndex++;
                    var pause = parseInt($('sentencePause').value) || 500;
                    setTimeout(function() { speakSentence(queueIndex); }, pause);
                } else {
                    isReadingAll = false;
                    queueIndex = 0;
                }
            }, index);
        }

        // ============================================================
        // 朗读全部
        // ============================================================
        function readAll() {
            if (state.sentences.length === 0) { showToast('请先处理学习内容'); return; }
            if (synth.speaking) synth.cancel();
            isReadingAll = true;
            queueIndex = 0;
            speakSentence(0);
        }

        // ============================================================
        // 停止朗读
        // ============================================================
        function stopReading() {
            if (synth.speaking) synth.cancel();
            isReadingAll = false;
            queueIndex = 0;
            document.querySelectorAll('.sentence-block').forEach(function(el) {
                el.classList.remove('speaking');
            });
            document.querySelectorAll('.primary.speaking-btn').forEach(function(el) {
                el.classList.remove('speaking-btn');
            });
            document.querySelectorAll('.reading-progress').forEach(function(el) {
                el.classList.remove('active');
            });
            clearHighlights();
            showToast('⏹ 已停止朗读');
        }

        // ============================================================
        // 生词本
        // ============================================================
        function addWordToVocab(index) {
            if (index < 0 || index >= state.sentences.length) return;
            var sentence = state.sentences[index];
            var words = sentence.match(/\b[a-zA-Z']+\b/g) || [];
            var added = 0;
            for (var i = 0; i < words.length; i++) {
                var word = words[i].toLowerCase();
                if (state.vocabulary.indexOf(word) === -1) {
                    state.vocabulary.push(word);
                    added++;
                }
            }
            saveState();
            showToast('✅ 已添加 ' + added + ' 个单词到生词本');
            updateStats();
        }

        function removeVocabItem(word) {
            var idx = state.vocabulary.indexOf(word);
            if (idx !== -1) {
                state.vocabulary.splice(idx, 1);
                saveState();
                showToast('🗑️ 已移除: ' + word);
                renderVocab();
            }
        }

            if (state.todayChecked) { showToast('✅ 今天已打卡'); return; }
            state.todayChecked = true;
            state.checkinDays += 1;
            state.lastCheckinDate = new Date().toISOString().slice(0, 10);
            updateCheckinUI();
            saveState();
            showToast('🎉 打卡成功！连续 ' + state.checkinDays + ' 天');
        }

        function updateCheckinUI() {
            var stars = state.checkinDays % 7;

                html += '<span class="' + (i < stars ? 'done' : 'todo') + '">⭐</span>';
            }

            $('checkinInfo').textContent = state.todayChecked ? '✅ 今日已打卡' : '📌 今日未打卡';

            var showWordMeaning = $('showWordMeaning') ? $('showWordMeaning').checked : true;
            var showSentenceMeaning = $('showSentenceMeaning') ? $('showSentenceMeaning').checked : true;
            var showPhrases = $('showPhrases') ? $('showPhrases').checked : true;

            document.querySelectorAll('.phonetic').forEach(function(el) { el.classList.toggle('hidden', !showPhonetic); });
            document.querySelectorAll('.word-meaning').forEach(function(el) { el.classList.toggle('hidden',

            document.documentElement.style.setProperty('--sentence-size', sentenceSize);

        function submitSentence() {
            var input = $('sentenceInput');
            if (!input) return;
            var text = input.value.trim();
            if (!text) { showToast('请写一句英文造句'); return; }
            var word = (state.sentences[0] || '').match(/\b[a-zA-Z']+\b/g)?.[0] || 'hello';
            var history = JSON.parse(localStorage.getItem('sentenceHistory') || '[]');
            history.push({ word: word, sentence: text, time: new Date().toLocaleString() });
            localStorage.setItem('sentenceHistory', JSON.stringify(history.slice(-20)));
            input.value = '';
            showToast('✅ 造句已保存');
            loadSentenceHistory();
        }

            var container = $('sentenceHistory');

            var history = JSON.parse(localStorage.getItem('sentenceHistory') || '[]');

                container.innerHTML = '<div style="color:#bbb;padding:8px 0;">还没有造句</div>';

                html += '<div style="background:#f8faff;padding:8px 12px;border-radius:8px;margin-bottom:6px;">' +

                    '<span style="color:#333;">' + item.sentence + '</span>' +
                    '<div style="font-size:11px;color:#999;margin-top:2px;">' + item.time + '</div></div>';
            }
            container.innerHTML = html;
        }

        function testApi() {
            var source = $('apiSource').value;
            var indicator = $('apiStatusIndicator');
            indicator.className = 'api-status checking';
            $('deepseekConfig').classList.toggle('hidden', source !== 'deepseek');

            if (source === 'local') {
                indicator.className = 'api-status online';
                return;
            }
            if (source === 'freedictionary') {
                fetch('https://api.dictionaryapi.dev/api/v2/entries/en/hello')
                    .then(function(r) {
                        indicator.className = r.ok ? 'api-status online' : 'api-status offline';
                    })
                    .catch(function() { indicator.className = 'api-status offline'; });
            }
            if (source === 'deepseek') {

                indicator.className = key ? 'api-status online' : 'api-status offline';

        // ============================================================
        // 语音初始化
        // ============================================================
        function initVoices() {
            return new Promise(function(resolve) {
                function loadVoices() {
                    var allVoices = synth.getVoices();
                    state.voices = [];
                    for (var i = 0; i < allVoices.length; i++) {
                        var v = allVoices[i];
                        if (v.lang.startsWith('en-US') || v.lang.startsWith('en-GB')) {
                            state.voices.push(v);
                        }
                    }
                    if (state.voices.length === 0) {
                        state.voices = allVoices;
                    }
                    var select = $('defaultVoice');
                    if (select) {
                        select.innerHTML = '<option value="auto">自动选择</option>';
                        for (var vi = 0; vi < state.voices.length; vi++) {
                            var v = state.voices[vi];
                            var opt = document.createElement('option');
                            opt.value = v.name;
                            var label = v.lang.startsWith('en-US') ? '🇺🇸' : '🇬🇧';
                            opt.textContent = label + ' ' + v.name.replace(/Microsoft |Google /g, '');
                            select.appendChild(opt);
                        }
                    }
                    resolve(state.voices);
                }
                if (synth.getVoices().length > 0) {
                    loadVoices();
                } else {
                    synth.onvoiceschanged = loadVoices;
                    setTimeout(loadVoices, 1000);
                }
            });
        }

        // ============================================================
        // 数据导出
        // ============================================================
        function exportData() {
            var data = {
                vocabulary: state.vocabulary,
                learned: state.learned,
                checkinDays: state.checkinDays,
                lastCheckinDate: state.lastCheckinDate,
                exportDate: new Date().toISOString()
            };
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'english_learning_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 数据导出成功');
        }

        function clearAllData() {
            if (!confirm('⚠️ 确认清空所有数据吗？')) return;
            state.vocabulary = [];
            state.learned = [];
            state.checkinDays = 0;
            state.todayChecked = false;
            state.lastCheckinDate = null;
            localStorage.removeItem('english_state');
            localStorage.removeItem('sentenceHistory');
            saveState();
            updateCheckinUI();
            updateStats();
            showToast('✅ 数据已清空');
        }

        // ============================================================
        // 状态持久化
        // ============================================================
        function saveState() {
            try {
                localStorage.setItem('english_state', JSON.stringify({
                    learned: state.learned || [],
                    vocabulary: state.vocabulary || [],
                    checkinDays: state.checkinDays || 0,
                    lastCheckinDate: state.lastCheckinDate || null,
                    todayChecked: state.todayChecked || false,
                }));
            } catch (e) { /* ignore */ }
        }

        function loadState() {
            try {
                var data = JSON.parse(localStorage.getItem('english_state') || '{}');
                state.learned = data.learned || [];
                state.vocabulary = data.vocabulary || [];
                state.checkinDays = data.checkinDays || 0;
                state.lastCheckinDate = data.lastCheckinDate || null;
                var today = new Date().toISOString().slice(0, 10);
                state.todayChecked = state.lastCheckinDate === today;
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        // Toast
        // ============================================================
        var toastTimer = null;

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                toastEl.classList.remove('show');
            }, 2000);
        }

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            loadState();
            updateCheckinUI();
            updateStats();
            updateDictSize();

            // 初始化高亮颜色
            updateHighlightColor();

            initVoices().then(function() {
                console.log('🗣️ 语音初始化完成');
            });

            testApi();

            var apiSource = $('apiSource');
            if (apiSource) {
                apiSource.addEventListener('change', testApi);
            }
            var apiInput = $('apiWordInput');
            if (apiInput) {
                apiInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') queryWordUI();
                });
            }

            setInterval(saveState, 10000);
            window.addEventListener('beforeunload', saveState);

            var total = typeof meaningDictionary !== 'undefined' ? Object.keys(meaningDictionary).length : 0;
            var phoneticTotal = typeof phoneticDictionary !== 'undefined' ? Object.keys(phoneticDictionary).length : 0;

            console.log('📚 英语智能学习系统已启动');
            console.log('📝 词义词典: ' + total + ' 个单词');
            console.log('🔊 音标词典: ' + phoneticTotal + ' 个单词');
            console.log('🔗 数据源: ' + getApiSource());

            setTimeout(processContent, 500);
        }

        // ============================================================
        // 暴露全局
        // ============================================================
        window.queryWordUI = queryWordUI;
        window.processContent = processContent;
        window.speakSentence = speakSentence;
        window.readAll = readAll;
        window.stopReading = stopReading;
        window.doCheckin = doCheckin;
        window.switchTab = switchTab;
        window.openSettings = openSettings;
        window.closeSettings = closeSettings;
        window.showToast = showToast;
        window.addWordToVocab = addWordToVocab;
        window.removeVocabItem = removeVocabItem;
        window.submitSentence = submitSentence;
        window.applyDisplaySettings = applyDisplaySettings;
        window.testApi = testApi;
        window.exportData = exportData;
        window.clearAllData = clearAllData;
        window.nextSentence = nextSentence;
        window.prevSentence = prevSentence;
        window.updateHighlightColor = updateHighlightColor;

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
