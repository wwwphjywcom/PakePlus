<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 英语智能学习系统</title>
    <style>
        /* ============================================================
           全局样式
           ============================================================ */
        :root {
            --primary: #4a6fa5;
            --primary-dark: #3a5f95;
            --primary-light: #6b8cbc;
            --text: #1a2332;
            --text-light: #6b7a8f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --sentence-size: 1.8em;
            --phonetic-size: 1.3em;
            --meaning-size: 1em;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 12px;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* ===== 顶部导航 ===== */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .app-header .logo {
                font-size: 18px;
                font-weight: 700;
            }

                .app-header .logo span {
                    font-size: 24px;
                    margin-right: 4px;
                }

            .app-header .header-actions {
                display: flex;
                gap: 8px;
            }

                .app-header .header-actions button {
                    background: rgba(255,255,255,0.2);
                    border: none;
                    color: #fff;
                    padding: 6px 14px;
                    border-radius: 20px;
                    font-size: 13px;
                    cursor: pointer;
                }

        /* ===== 统计卡片 ===== */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            box-shadow: var(--shadow);
        }

            .stat-card .number {
                font-size: 20px;
                font-weight: 700;
                color: var(--primary);
            }

            .stat-card .label {
                font-size: 10px;
                color: var(--text-light);
                margin-top: 2px;
            }

        /* ===== 打卡条 ===== */
        .checkin-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

            .checkin-bar .stars {
                display: flex;
                gap: 3px;
                font-size: 20px;
            }

                .checkin-bar .stars .done {
                    opacity: 1;
                }

                .checkin-bar .stars .todo {
                    opacity: 0.25;
                }

            .checkin-bar .info {
                font-size: 12px;
                color: var(--text-light);
                flex: 1;
            }

            .checkin-bar .check-btn {
                background: #4caf50;
                color: #fff;
                border: none;
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }

                .checkin-bar .check-btn:disabled {
                    opacity: 0.5;
                    cursor: not-allowed;
                }

        /* ===== 选择器 ===== */
        .selector-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
        }

            .selector-bar select {
                padding: 8px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                background: #fff;
                flex: 1;
                min-width: 100px;
                height: 40px;
                appearance: auto;
                -webkit-appearance: menulist;
            }

                .selector-bar select:focus {
                    outline: none;
                    border-color: var(--primary);
                    box-shadow: 0 0 0 3px rgba(74,111,165,0.2);
                }

            .selector-bar .btn-load {
                padding: 8px 20px;
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                white-space: nowrap;
                height: 40px;
            }

                .selector-bar .btn-load:hover {
                    background: var(--primary-dark);
                }

        /* ===== API 查询 ===== */
        .api-query {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }

            .api-query .row {
                display: flex;
                gap: 8px;
            }

            .api-query input {
                flex: 1;
                padding: 10px 14px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 16px;
            }

            .api-query button {
                padding: 10px 18px;
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                white-space: nowrap;
            }

        .api-result {
            padding: 10px;
            background: #f8faff;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 14px;
            max-height: 150px;
            overflow-y: auto;
        }

            .api-result .word {
                font-weight: 700;
                font-size: 18px;
                color: var(--primary);
            }

            .api-result .phonetic {
                color: var(--text-light);
                font-family: "Times New Roman", serif;
            }

            .api-result .pos {
                font-weight: 600;
                color: #2c3e50;
                margin-right: 6px;
            }

            .api-result .source {
                font-size: 12px;
                color: #999;
                margin-top: 4px;
            }

        /* ===== 学习内容 ===== */
        .learning-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

            .learning-area .section-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--primary);
                margin-bottom: 12px;
                padding-bottom: 8px;
                border-bottom: 2px solid var(--bg);
            }

                .learning-area .section-title .badge {
                    font-size: 12px;
                    font-weight: 400;
                    color: var(--text-light);
                    margin-left: 8px;
                }

        /* ===== 句子块 ===== */
        .sentence-block {
            padding: 16px;
            border-left: 4px solid var(--primary-light);
            border-radius: 0 8px 8px 0;
            margin-bottom: 12px;
            background: #f8f9fa;
            transition: all 0.2s;
        }

            .sentence-block:active {
                transform: scale(0.99);
            }

        .original {
            font-size: var(--sentence-size);
            font-weight: 700;
            color: var(--text);
            line-height: 1.6;
            word-break: break-word;
        }

        .phonetic {
            font-size: var(--phonetic-size);
            color: var(--text-light);
            margin: 4px 0 6px;
            font-family: "Times New Roman", serif;
            word-break: break-word;
        }

        .word-meaning {
            font-size: var(--meaning-size);
            color: var(--text);
            margin: 4px 0;
            word-break: break-word;
        }

        .sentence-meaning {
            font-size: var(--meaning-size);
            color: var(--text-light);
            margin: 4px 0 8px;
            font-style: italic;
        }

        /* ===== 音节颜色 ===== */
        .syllable-1 {
            color: #e63946;
        }

        .syllable-2 {
            color: #1d3557;
        }

        .syllable-3 {
            color: #1d6491;
        }

        .syllable-4 {
            color: #2a8008;
        }

        .syllable-5 {
            color: #d86b2a;
        }

        .syllable-6 {
            color: #2a9d8f;
        }

        .syllable-7 {
            color: #8e44ad;
        }

        .syllable-8 {
            color: #e67e22;
        }

        .unknown-word {
            text-decoration: underline wavy #e74c3c;
        }

        .unknown-phonetic {
            text-decoration: underline wavy #e74c3c;
        }

        /* ===== 单词列表 ===== */
        .word-list {
            margin-top: 10px;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .word-item {
            display: inline-block;
            padding: 4px 12px;
            background: #fff;
            border-radius: 16px;
            font-size: 13px;
            border: 1px solid #e0e0e0;
            white-space: nowrap;
        }

            .word-item .word {
                font-weight: 700;
                color: #2c3e50;
            }

            .word-item .phonetic-small {
                color: #999;
                font-size: 11px;
                margin: 0 4px;
            }

            .word-item .meaning {
                color: var(--primary);
            }

        /* ===== 短语区域 ===== */
        .phrase-section {
            margin-top: 10px;
            padding: 10px 12px;
            background: #fef9e7;
            border-radius: 8px;
            border-left: 3px solid #f39c12;
        }

            .phrase-section .title {
                font-size: 12px;
                font-weight: 700;
                color: #e67e22;
                margin-bottom: 4px;
            }

        .phrase-item {
            display: flex;
            gap: 8px;
            font-size: 14px;
            padding: 2px 0;
            flex-wrap: wrap;
        }

            .phrase-item .en {
                font-weight: 600;
                color: #2c3e50;
            }

            .phrase-item .zh {
                color: #666;
            }

        /* ===== 控制按钮 ===== */
        .sentence-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

            .sentence-controls button {
                padding: 6px 14px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
                font-size: 13px;
                transition: all 0.2s;
                background: #e8ecf1;
                color: #333;
                white-space: nowrap;
            }

                .sentence-controls button:active {
                    transform: scale(0.95);
                }

                .sentence-controls button.primary {
                    background: var(--primary);
                    color: #fff;
                }

                    .sentence-controls button.primary:hover {
                        background: var(--primary-dark);
                    }

                .sentence-controls button.success {
                    background: #4caf50;
                    color: #fff;
                }

            .sentence-controls .nav-info {
                font-size: 13px;
                color: #999;
                margin: 0 6px;
            }

        /* ===== 朗读高亮 ===== */
        .highlight-word {
            background: #fffd78;
            padding: 0 2px;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .emphasis {
            background: #fffd78;
            padding: 0 2px;
            border-radius: 2px;
        }

        .phonetic-emphasis {
            background: rgba(74,111,165,0.2);
            border-radius: 2px;
            padding: 0 2px;
        }

        .meaning-emphasis {
            background: rgba(42,157,143,0.2);
            border-radius: 2px;
            padding: 0 2px;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--card-bg);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 6px 0 12px;
            border-top: 1px solid #eee;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            z-index: 100;
        }

            .bottom-nav .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                border: none;
                background: none;
                font-size: 10px;
                color: var(--text-light);
                cursor: pointer;
                padding: 4px 0;
            }

                .bottom-nav .nav-item .icon {
                    font-size: 22px;
                }

                .bottom-nav .nav-item.active {
                    color: var(--primary);
                    font-weight: 600;
                }

        /* ===== 设置面板 ===== */
        .settings-toggle {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 52px;
            height: 52px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(74,111,165,0.4);
            z-index: 50;
        }

            .settings-toggle:active {
                transform: scale(0.9);
            }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--card-bg);
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -4px 0 30px rgba(0,0,0,0.15);
        }

            .settings-panel.open {
                right: 0;
            }

            .settings-panel .close-btn {
                position: sticky;
                top: 0;
                background: var(--card-bg);
                padding: 8px 0;
                border: none;
                font-size: 24px;
                cursor: pointer;
                display: block;
                margin-left: auto;
                z-index: 5;
            }

            .settings-panel h2 {
                font-size: 18px;
                color: var(--primary);
                margin: 8px 0 16px;
                padding-bottom: 8px;
                border-bottom: 2px solid var(--bg);
            }

            .settings-panel .section-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--primary);
                margin: 16px 0 10px;
            }

            .settings-panel .form-group {
                margin-bottom: 12px;
            }

            .settings-panel label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: var(--text-light);
                margin-bottom: 3px;
            }

            .settings-panel select,
            .settings-panel input[type="text"],
            .settings-panel input[type="number"] {
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                background: #fafafa;
                height: 40px;
                appearance: auto;
                -webkit-appearance: menulist;
            }

            .settings-panel input[type="range"] {
                width: 100%;
            }

            .settings-panel .range-value {
                font-size: 13px;
                color: var(--primary);
                font-weight: 600;
            }

            .settings-panel .checkbox-group {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 4px 0;
            }

                .settings-panel .checkbox-group label {
                    margin: 0;
                    font-weight: 400;
                }

            .settings-panel .btn-primary {
                background: var(--primary);
                color: #fff;
                border: none;
                padding: 10px 16px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                width: 100%;
                margin-top: 4px;
            }

                .settings-panel .btn-primary:active {
                    background: var(--primary-dark);
                }

            .settings-panel .btn-danger {
                background: #e74c3c;
            }

                .settings-panel .btn-danger:active {
                    background: #c0392b;
                }

            .settings-panel .voice-setting {
                background: var(--bg);
                padding: 8px 12px;
                border-radius: 8px;
                margin-bottom: 6px;
            }

            .settings-panel .voice-preview {
                font-size: 12px;
                color: var(--primary);
                cursor: pointer;
                padding: 2px 8px;
                border-radius: 12px;
                background: rgba(74,111,165,0.1);
                display: inline-block;
                margin-top: 4px;
            }

            .settings-panel .api-status {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                margin-left: 6px;
            }

                .settings-panel .api-status.online {
                    background: #4caf50;
                }

                .settings-panel .api-status.offline {
                    background: #e74c3c;
                }

                .settings-panel .api-status.checking {
                    background: #f39c12;
                    animation: pulse 0.8s infinite;
                }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ===== 遮罩 ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

            .overlay.show {
                opacity: 1;
                pointer-events: auto;
            }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.25s;
            max-width: 90%;
            white-space: nowrap;
        }

            .toast.show {
                opacity: 1;
            }

        .hidden {
            display: none !important;
        }

        /* ===== 加载 ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

            .loading .spinner {
                display: inline-block;
                width: 30px;
                height: 30px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid var(--primary);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .stats-cards {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }

            .stat-card .number {
                font-size: 16px;
            }

            .stat-card .label {
                font-size: 9px;
            }

            :root {
                --sentence-size: 1.5em;
                --phonetic-size: 1.1em;
            }

            .selector-bar select {
                font-size: 13px;
                padding: 6px 8px;
                min-width: 70px;
                height: 34px;
            }

            .selector-bar .btn-load {
                height: 34px;
                font-size: 13px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部 ===== -->
    <header class="app-header">
        <div class="logo"><span>📚</span> 英语智能学习</div>
        <div class="header-actions">
            <button onclick="showToast('👤 个人中心')">👤</button>
            <button onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- ===== 统计 ===== -->
    <div class="stats-cards" id="statsCards">
        <div class="stat-card"><div class="number" id="wordCount">0</div><div class="label">📝 词汇量</div></div>
        <div class="stat-card"><div class="number" id="sentenceCount">0</div><div class="label">💬 句子数</div></div>
        <div class="stat-card"><div class="number" id="studyDays">0</div><div class="label">🔥 连续学习</div></div>
        <div class="stat-card"><div class="number" id="todayProgress">0%</div><div class="label">📊 今日进度</div></div>
    </div>

    <!-- ===== 打卡条 ===== -->
    <div class="checkin-bar">
        <div class="stars" id="starDisplay">
            <span class="done">⭐</span><span class="done">⭐</span><span class="done">⭐</span>
            <span class="todo">⭐</span><span class="todo">⭐</span><span class="todo">⭐</span><span class="todo">⭐</span>
        </div>
        <div class="info" id="checkinInfo">今日未打卡</div>
        <button class="check-btn" id="checkinBtn" onclick="doCheckin()">✅ 打卡</button>
    </div>

    <!-- ===== API 查询 ===== -->
    <div class="api-query">
        <div class="row">
            <input type="text" id="apiWordInput" placeholder="输入单词查询音标和释义..." value="beautiful">
            <button onclick="queryWordUI()">🔍 查询</button>
        </div>
        <div class="api-result" id="apiResult">点击查询获取单词详情</div>
    </div>

    <!-- ===== 选择器 ===== -->
    <div class="selector-bar">
        <select id="textbookSelect" onchange="onTextbookChange()">
            <option value="">📚 选择教材</option>
        </select>
        <select id="unitSelect" onchange="onUnitChange()">
            <option value="">📖 选择单元</option>
        </select>
        <select id="lessonSelect" onchange="onLessonChange()">
            <option value="">📝 选择课文</option>
        </select>
        <button class="btn-load" onclick="loadLesson()">🚀 加载</button>
    </div>

    <!-- ===== 学习内容 ===== -->
    <div class="learning-area" id="learningArea">
        <div class="section-title">
            📖 课文内容
            <span class="badge" id="lessonTitle">请选择课文</span>
        </div>
        <div id="lessonContent">
            <div class="loading"><div class="spinner"></div><p>请选择教材、单元和课文</p></div>
        </div>
    </div>

    <!-- ===== 底部导航 ===== -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><span class="icon">🏠</span> 学习</button>
        <button class="nav-item" onclick="switchTab('vocab')"><span class="icon">📝</span> 生词本</button>
        <button class="nav-item" onclick="switchTab('write')"><span class="icon">✍️</span> 造句</button>
        <button class="nav-item" onclick="switchTab('stats')"><span class="icon">📊</span> 统计</button>
        <button class="nav-item" onclick="openSettings()"><span class="icon">⚙️</span> 设置</button>
    </div>

    <!-- ===== 设置按钮 ===== -->
    <button class="settings-toggle" onclick="openSettings()">⚙️</button>

    <!-- ===== 遮罩 ===== -->
    <div class="overlay" id="overlay" onclick="closeSettings()"></div>

    <!-- ===== 设置面板 ===== -->
    <div class="settings-panel" id="settingsPanel">

        var DB_NAME = 'EnglishLearningDB';
        var DB_VERSION = 1;

        function openDatabase() {
            return new Promise(function (resolve, reject) {
                var request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = function () { reject(request.error); };
                request.onsuccess = function () { resolve(request.result); };
                request.onupgradeneeded = function (event) {
                    var db = event.target.result;
                    var stores = ['textbooks', 'units', 'lessons', 'sentences', 'words', 'vocabulary', 'studyRecords'];
                    stores.forEach(function (name) {
                        if (!db.objectStoreNames.contains(name)) {
                            var store = db.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
                            if (name === 'textbooks') store.createIndex('grade', 'grade', { unique: false });
                            if (name === 'units') store.createIndex('textbookId', 'textbookId', { unique: false });
                            if (name === 'lessons') store.createIndex('unitId', 'unitId', { unique: false });
                            if (name === 'sentences') store.createIndex('lessonId', 'lessonId', { unique: false });
                            if (name === 'words') {
                                store.createIndex('sentenceId', 'sentenceId', { unique: false });
                                store.createIndex('word', 'word', { unique: false });
                            }
                            if (name === 'vocabulary') {
                                store.createIndex('userId', 'userId', { unique: false });
                                store.createIndex('wordId', 'wordId', { unique: false });
                            }
                            if (name === 'studyRecords') {
                                store.createIndex('userId', 'userId', { unique: false });
                                store.createIndex('studyDate', 'studyDate', { unique: false });
                            }
                        }
                    });
                };
            });
        }

        function addRecord(storeName, data) {
            return openDatabase().then(function (db) {
                return new Promise(function (resolve, reject) {
                    var tx = db.transaction(storeName, 'readwrite');
                    var store = tx.objectStore(storeName);
                    var request = store.add(data);
                    request.onsuccess = function () { resolve(request.result); };
                    request.onerror = function () { reject(request.error); };
                });
            });
        }

        function getAllRecords(storeName) {
            return openDatabase().then(function (db) {
                return new Promise(function (resolve, reject) {
                    var tx = db.transaction(storeName, 'readonly');
                    var store = tx.objectStore(storeName);
                    var request = store.getAll();
                    request.onsuccess = function () { resolve(request.result); };
                    request.onerror = function () { reject(request.error); };
                });
            });
        }

        function getRecordsByIndex(storeName, indexName, value) {
            return openDatabase().then(function (db) {
                return new Promise(function (resolve, reject) {
                    var tx = db.transaction(storeName, 'readonly');
                    var store = tx.objectStore(storeName);
                    var index = store.index(indexName);
                    var request = index.getAll(value);
                    request.onsuccess = function () { resolve(request.result); };
                    request.onerror = function () { reject(request.error); };
                });
            });
        }

        function getRecordById(storeName, id) {
            return openDatabase().then(function (db) {
                return new Promise(function (resolve, reject) {
                    var tx = db.transaction(storeName, 'readonly');
                    var store = tx.objectStore(storeName);
                    var request = store.get(id);
                    request.onsuccess = function () { resolve(request.result); };
                    request.onerror = function () { reject(request.error); };

            });
        }

        function deleteRecord(storeName, id) {

                    var request = store.delete(id);
                    request.onsuccess = function () { resolve(); };

                    var request = store.clear();

        // ============================================================
        // 单词查询 - 多数据源
        // ============================================================
        function getApiSource() {
            return $('apiSource') ? $('apiSource').value : 'freedictionary';
        }

        function queryLocal(word) {
            var data = LOCAL_DICT[word];
            if (data) {
                return {
                    word: word, phonetic: data.phonetic || '/' + word + '/', meaning: data.meaning || '未知',
                    pos: data.pos || '', source: 'local'
                };
            }
            var base = getBaseForm(word);
            if (base && LOCAL_DICT[base]) {
                var d = LOCAL_DICT[base];
                var phonetic = d.phonetic || '/' + word + '/';
                if (word !== base && word.endsWith('s')) {
                    phonetic = adjustPluralPhonetic(phonetic, word);
                }
                return { word: word, phonetic: phonetic, meaning: d.meaning || '未知', pos: d.pos || '', source: 'local' };
            }
            return null;
        }

        function getBaseForm(word) {
            if (LOCAL_DICT[word]) return word;
            if (word.endsWith('es')) { var b = word.slice(0, -2); if (LOCAL_DICT[b]) return b; }
            if (word.endsWith('s') && word.length > 1) { var b = word.slice(0, -1); if (LOCAL_DICT[b]) return b; }
            if (word.endsWith('ies')) { var b = word.slice(0, -3) + 'y'; if (LOCAL_DICT[b]) return b; }
            if (word.endsWith('ing')) { var b = word.slice(0, -3); if (LOCAL_DICT[b]) return b; }
            if (word.endsWith('ed')) { var b = word.slice(0, -2); if (LOCAL_DICT[b]) return b; }
            var irregular = {
                'children': 'child', 'men': 'man', 'women': 'woman', 'feet': 'foot', 'teeth': 'tooth',
                'mice': 'mouse', 'people': 'person', 'geese': 'goose', 'oxen': 'ox'
            };
            return irregular[word] || null;
        }

        function adjustPluralPhonetic(phonetic, pluralWord) {
            if (!phonetic) return '/' + pluralWord + '/';
            var clean = phonetic.replace(/^\/|\/$/g, '');
            if (pluralWord.endsWith('s') || pluralWord.endsWith('es')) {
                var last = clean.charAt(clean.length - 1);
                if (['p', 't', 'k', 'f', 'θ'].indexOf(last) !== -1) { return '/' + clean + 's/'; }
                if (['s', 'z', 'ʃ', 'ʒ', 'tʃ', 'dʒ'].some(function (e) { return clean.endsWith(e); })) {
                    return '/' +
                        clean + 'ɪz/';
                }
                return '/' + clean + 'z/';
            }
            return '/' + clean + '/';
        }

        function queryFreeDictionary(word) {
            return fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + word)
                .then(function (response) {
                    if (!response.ok) throw new Error('Word not found');
                    return response.json();
                })
                .then(function (data) {
                    if (!data || data.length === 0) return null;
                    var entry = data[0];
                    var phonetic = entry.phonetic || '';
                    if (!phonetic && entry.phonetics) {
                        var found = entry.phonetics.find(function (p) { return p.text; });
                        if (found) phonetic = found.text;
                    }
                    var meaning = '';
                    var pos = '';
                    if (entry.meanings && entry.meanings.length > 0) {
                        var first = entry.meanings[0];
                        pos = first.partOfSpeech || '';
                        if (first.definitions && first.definitions.length > 0) {
                            meaning = first.definitions[0].definition;
                        }
                    }
                    return {
                        word: word, phonetic: phonetic || '/' + word + '/', meaning: meaning || '未知词义',
                        pos: pos || '', source: 'freedictionary'
                    };
                });
        }

        function queryDeepSeek(word) {
            var apiKey = $('deepseekKey') ? $('deepseekKey').value.trim() : '';
            if (!apiKey) { return Promise.reject(new Error('请设置 DeepSeek API Key')); }
            var apiUrl = $('deepseekUrl') ? $('deepseekUrl').value : 'https://api.deepseek.com/v1/chat/completions';
            var model = $('deepseekModel') ? $('deepseekModel').value : 'deepseek-chat';
            var prompt = '请为英语单词 "' + word + '" 提供以下信息，以JSON格式返回（只返回JSON，不要其他内容）：\n' +
                '{\n    "word": "' + word + '",\n    "phonetic": "国际音标",\n    "meaning": "中文释义",\n    "pos": "词性（如 n., v., adj., adv. 等）"\n}';
            return fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: 'system', content: '你是一个英语词典助手，只返回JSON格式数据。' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.3,
                    max_tokens: 200
                })
            }).then(function (response) {
                if (!response.ok) { return response.text().then(function (text) { throw new Error('API 错误: ' + text); }); }
                return response.json();
            }).then(function (data) {
                var content = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message
                    .content : '';
                try {
                    var parsed = JSON.parse(content);
                    return {
                        word: parsed.word || word, phonetic: parsed.phonetic || '/' + word + '/',
                        meaning: parsed.meaning || '未知词义', pos: parsed.pos || '', source: 'deepseek'
                    };
                } catch (e) {
                    throw new Error('解析 JSON 失败');
                }
            });
        }

        function queryWord(word) {
            var lowerWord = word.toLowerCase().trim();
            if (!lowerWord) return Promise.resolve(null);
            var source = getApiSource();
            var cacheKey = source + '_' + lowerWord;
            if (state.wordCache[cacheKey]) {
                return Promise.resolve(state.wordCache[cacheKey]);
            }
            var promise;
            if (source === 'local') {
                promise = Promise.resolve(queryLocal(lowerWord));
            } else if (source === 'freedictionary') {
                promise = queryFreeDictionary(lowerWord).catch(function () {
                    return queryLocal(lowerWord);
                });
            } else if (source === 'deepseek') {
                promise = queryDeepSeek(lowerWord).catch(function () {
                    return queryLocal(lowerWord);
                });
            } else {
                promise = Promise.resolve(queryLocal(lowerWord));
            }
            return promise.then(function (result) {
                if (result) {
                    state.wordCache[cacheKey] = result;
                }
                return result;
            });
        }

        // ============================================================
        // 使用API增强句子中的单词信息
        // ============================================================
        function enhanceSentencesWithAPI() {
            var blocks = document.querySelectorAll('.sentence-block');
            for (var bi = 0; bi < blocks.length; bi++) {
                var block = blocks[bi];
                var originalEl = block.querySelector('.original');
                if (!originalEl) continue;
                var text = originalEl.textContent;
                var words = text.match(/\b[a-zA-Z']+\b/g) || [];

                // 查询每个单词并更新显示
                var phoneticParts = [];
                var meaningParts = [];
                var unknownWords = [];
                var promises = [];

                for (var wi = 0; wi < words.length; wi++) {
                    (function (word) {
                        promises.push(
                            queryWord(word).then(function (data) {
                                if (data) {
                                    phoneticParts.push(data.phonetic || '/' + word + '/');
                                    meaningParts.push(word + ': ' + data.meaning);
                                    if (data.source === 'local' && !LOCAL_DICT[word] && !getBaseForm(
                                        word)) {
                                        unknownWords.push(word.toLowerCase());
                                    }
                                } else {
                                    unknownWords.push(word.toLowerCase());
                                    phoneticParts.push('/' + word + '/');
                                    meaningParts.push(word + ': 未知');
                                }
                            })
                        );
                    })(words[wi]);
                }

                Promise.all(promises).then(function () {
                    // 更新音标
                    var phoneticEl = block.querySelector('.phonetic');
                    if (phoneticEl && phoneticParts.length > 0) {
                        var coloredPhonetic = colorizePhonetics(phoneticParts.join(' '), text, unknownWords);
                        phoneticEl.innerHTML = coloredPhonetic;
                    }
                    // 更新释义
                    var meaningEl = block.querySelector('.word-meaning');
                    if (meaningEl && meaningParts.length > 0) {
                        var coloredMeaning = colorizeMeanings(meaningParts.join('; '), text);
                        meaningEl.innerHTML = coloredMeaning;
                    }
                    // 更新原始文本颜色
                    var coloredOriginal = colorizeText(text, unknownWords);
                    originalEl.innerHTML = coloredOriginal;
                });
            }
        }

        // ============================================================
        // 文本渲染函数
        // ============================================================
        function detectPhrases(text) {
            var found = [];
            var lower = text.toLowerCase();
            for (var key in PHRASE_DICT) {
                if (lower.indexOf(key) !== -1) {
                    found.push({ phrase: key, meaning: PHRASE_DICT[key] });
                }
            }
            return found;
        }

        function splitSyllables(word) {
            var vowels = ['a', 'e', 'i', 'o', 'u', 'y'];
            var syls = [];
            var current = '';
            for (var i = 0; i < word.length; i++) {
                current += word[i];
                if (vowels.indexOf(word[i].toLowerCase()) !== -1 && i < word.length - 1 &&
                    vowels.indexOf(word[i + 1].toLowerCase()) === -1) {
                    syls.push(current);
                    current = '';
                }
            }
            if (current) syls.push(current);
            return syls.length > 0 ? syls : [word];
        }

        function colorizeText(text, unknownWords) {
            var parts = text.split(/(\s+|[^\w']+)/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < parts.length; i++) {
                var part = parts[i];
                if (!part) continue;
                if (/^\s+$/.test(part) || /[^\w']/.test(part)) {
                    result += part;
                    continue;
                }
                var isUnknown = unknownWords && unknownWords.indexOf(part.toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-word' : '';
                var syllables = splitSyllables(part);
                var colored = '';
                for (var si = 0; si < syllables.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + part +
                        '">' + syllables[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += colored;
            }
            return result;
        }

        function colorizePhonetics(phonetic, original, unknownWords) {
            if (!phonetic) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var phoneticParts = phonetic.split(/\s+/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= phoneticParts.length) break;
                var isUnknown = unknownWords && unknownWords.indexOf(words[i].toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-phonetic' : '';
                var clean = phoneticParts[i].replace(/^\/|\/$/g, '');
                var syls = splitSyllables(clean);
                var colored = '';
                for (var si = 0; si < syls.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + words[i] +
                        '">' + syls[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += '/' + colored + '/ ';
            }
            return result;
        }

        function colorizeMeanings(meanings, original) {
            if (!meanings) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var meaningList = meanings.split('; ');
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= meaningList.length) break;
                result += '<span class="syllable-' + colorIdx + '" data-word="' + words[i] + '">' + meaningList[i] +
                    '</span>; ';
                colorIdx = colorIdx % 8 + 1;
            }
            return result;
        }

        // ============================================================
        // 处理自定义内容
        // ============================================================
        function processContent() {
            var input = $('contentInput');
            if (!input) return;
            var text = input.value.trim();

            };

        // ============================================================
        // 句子导航
        // ============================================================
        function nextSentence() {
            if (state.currentSentenceIndex < state.sentences.length - 1) {
                state.currentSentenceIndex++;
                loadLessonContent(state.currentLessonId);
            }
        }

        function prevSentence() {

                state.currentSentenceIndex--;
                loadLessonContent(state.currentLessonId);
            }
        }

        // ============================================================
        // 语音合成
        // ============================================================
        var synth = window.speechSynthesis;
        var currentUtterance = null;
        var isReadingAll = false;
        var queueIndex = 0;

        function getVoice(selectorId) {
            var select = $(selectorId);
            if (!select || select.value === 'auto') return null;
            for (var i = 0; i < state.voices.length; i++) {
                if (state.voices[i].name === select.value) return state.voices[i];
            }
            return null;
        }

        function getVoiceForSentence(sentence) {
            var trimmed = sentence.trim();
            if (trimmed.indexOf('@@') === 0) return getVoice('atSignVoice');
            if (trimmed.indexOf('##') === 0) return getVoice('hashSignVoice');
            return getVoice('defaultVoice');
        }

        function speakText(text, voice, rate, onEnd) {
            if (!text) return;
            if (synth.speaking) synth.cancel();

            var utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = parseFloat($('speechRate').value) || 0.8;
            if (voice) utterance.voice = voice;

            currentUtterance = utterance;

            var words = text.split(/\s+/);
            var wordIndex = 0;
            utterance.onboundary = function (event) {
                if (event.name === 'word' && wordIndex < words.length) {
                    highlightWord(words[wordIndex]);
                    wordIndex++;
                }
            };

            utterance.onend = function () {
                resetHighlight();
                if (onEnd) onEnd();
            };

            utterance.onerror = function () {
                resetHighlight();
                if (onEnd) onEnd();
            };

            synth.speak(utterance);
        }

        function highlightWord(word) {
            resetHighlight();
            var blocks = document.querySelectorAll('.sentence-block');
            for (var bi = 0; bi < blocks.length; bi++) {
                var block = blocks[bi];
                var spans = block.querySelectorAll('.original span');
                for (var si = 0; si < spans.length; si++) {
                    var text = spans[si].textContent.toLowerCase().replace(/[^a-z']/g, '');
                    if (text === word.toLowerCase().replace(/[^a-z']/g, '')) {
                        spans[si].classList.add('emphasis');
                    }
                }
                var pSpans = block.querySelectorAll('.phonetic span');
                for (var pi = 0; pi < pSpans.length; pi++) {
                    var w = pSpans[pi].getAttribute('data-word');
                    if (w && w.toLowerCase() === word.toLowerCase()) {
                        pSpans[pi].classList.add('phonetic-emphasis');
                    }
                }
                var mSpans = block.querySelectorAll('.word-meaning span');
                for (var mi = 0; mi < mSpans.length; mi++) {
                    var w = mSpans[mi].getAttribute('data-word');
                    if (w && w.toLowerCase() === word.toLowerCase()) {
                        mSpans[mi].classList.add('meaning-emphasis');
                    }
                }
            }
        }

        function resetHighlight() {
            var els = document.querySelectorAll('.emphasis, .phonetic-emphasis, .meaning-emphasis');
            for (var i = 0; i < els.length; i++) {
                els[i].classList.remove('emphasis', 'phonetic-emphasis', 'meaning-emphasis');
            }
        }

        function speakSentence(index) {
            if (index < 0 || index >= state.sentences.length) return;
            var sentence = state.sentences[index];
            if (!sentence) return;

            var blocks = document.querySelectorAll('.sentence-block');
            for (var bi = 0; bi < blocks.length; bi++) {
                blocks[bi].style.borderLeftColor = '#6b8cbc';
                blocks[bi].style.background = '#f8f9fa';
            }
            var block = document.getElementById('sentence-' + index);
            if (block) {
                block.style.borderLeftColor = '#ff9800';
                block.style.background = '#fff8e1';
            }

            var text = sentence.originalText || '';
            var cleanText = text.replace(/^(@@|##)\s*/, '').trim();
            var voice = getVoiceForSentence(text);
            var rate = parseFloat($('speechRate').value) || 0.8;

            var btns = document.querySelectorAll('.read-btn');
            for (var bi2 = 0; bi2 < btns.length; bi2++) {
                btns[bi2].classList.toggle('speaking', bi2 === index);
            }

            speakText(cleanText, voice, rate, function () {
                for (var bi3 = 0; bi3 < btns.length; bi3++) {
                    btns[bi3].classList.remove('speaking');
                }
                if (isReadingAll && queueIndex < state.sentences.length - 1) {
                    queueIndex++;
                    var pause = parseInt($('sentencePause').value) || 500;
                    setTimeout(function () { speakSentence(queueIndex); }, pause);
                } else {
                    isReadingAll = false;
                    queueIndex = 0;
                }
            });
        }

        function speakWord(index) {
            if (index < 0 || index >= state.sentences.length) return;
            var sentence = state.sentences[index];
            var words = state.words.filter(function (w) { return w.sentenceId === sentence.id; });
            if (words.length === 0) { showToast('没有单词数据'); return; }
            var word = words[0].word || '';
            var utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = parseFloat($('speechRate').value) || 0.8;
            var voice = getVoice('defaultVoice');
            if (voice) utterance.voice = voice;
            synth.speak(utterance);
            showToast('🔤 朗读单词: ' + word + ' (' + (words[0].meaning || '') + ')');
        }

        function speakAll() {
            if (state.sentences.length === 0) { showToast('请先加载学习内容'); return; }
            if (synth.speaking) synth.cancel();
            isReadingAll = true;
            queueIndex = 0;
            speakSentence(0);
        }

        function stopSpeaking() {
            if (synth.speaking) synth.cancel();
            isReadingAll = false;
            queueIndex = 0;
            document.querySelectorAll('.read-btn').forEach(function (btn) { btn.classList.remove('speaking'); });
            resetHighlight();
            showToast('⏹ 已停止朗读');
        }

        // ============================================================
        // 初始化语音
        // ============================================================
        function initVoices() {
            return new Promise(function (resolve) {
                function loadVoices() {
                    var allVoices = synth.getVoices();
                    state.voices = [];
                    for (var i = 0; i < allVoices.length; i++) {
                        var v = allVoices[i];
                        if (v.lang.startsWith('en-US') || v.lang.startsWith('en-GB')) {
                            state.voices.push(v);
                        }
                    }
                    if (state.voices.length === 0) {
                        state.voices = allVoices;
                    }
                    var selectors = ['defaultVoice', 'atSignVoice', 'hashSignVoice'];
                    for (var si = 0; si < selectors.length; si++) {
                        var select = $(selectors[si]);
                        if (select) {
                            select.innerHTML = '<option value="auto">自动选择</option>';
                            for (var vi = 0; vi < state.voices.length; vi++) {
                                var v = state.voices[vi];
                                var opt = document.createElement('option');
                                opt.value = v.name;
                                var label = v.lang.startsWith('en-US') ? '🇺🇸' : '🇬🇧';
                                opt.textContent = label + ' ' + v.name.replace(/Microsoft |Google /g, '');
                                select.appendChild(opt);
                            }
                        }
                    }
                    resolve(state.voices);
                }
                if (synth.getVoices().length > 0) {
                    loadVoices();
                } else {
                    synth.onvoiceschanged = loadVoices;
                    setTimeout(loadVoices, 1000);
                }
            });
        }

        function previewVoice(selectorId) {
            var select = $(selectorId);
            if (!select || select.value === 'auto') { showToast('请先选择一个具体音色'); return; }
            var voice = null;
            for (var i = 0; i < state.voices.length; i++) {
                if (state.voices[i].name === select.value) { voice = state.voices[i]; break; }
            }
            if (!voice) { showToast('语音不可用'); return; }
            var utterance = new SpeechSynthesisUtterance('This is a voice preview.');
            utterance.voice = voice;
            utterance.rate = 0.8;
            synth.speak(utterance);
        }

        // ============================================================
        // 复制句子
        // ============================================================
        function copySentence(index) {
            var sentence = state.sentences[index];
            if (!sentence) return;
            var text = (sentence.originalText || '') + '\n' + (sentence.translation || '');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function () {
                    showToast('📋 已复制到剪贴板');
                }).catch(function () {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('📋 已复制到剪贴板');
        }

        // ============================================================
        // 生词本
        // ============================================================
        function addToVocabulary() {
            var sentence = state.sentences[state.currentSentenceIndex];
            if (!sentence) { showToast('请先选择一句'); return; }
            var words = state.words.filter(function (w) { return w.sentenceId === sentence.id; });
            if (words.length === 0) { showToast('没有单词可添加'); return; }
            var added = 0;
            var promise = Promise.resolve();
            for (var i = 0; i < words.length; i++) {
                (function (w) {
                    promise = promise.then(function () {
                        return getRecordsByIndex('vocabulary', 'wordId', w.id).then(function (existing) {
                            if (existing.length === 0) {
                                return addRecord('vocabulary', {
                                    userId: 1,
                                    wordId: w.id,
                                    addedAt: new Date().toISOString(),
                                    masteryLevel: 0
                                }).then(function () { added++; });
                            }
                        });
                    });
                })(words[i]);
            }
            promise.then(function () {
                showToast('✅ 已添加 ' + added + ' 个单词到生词本');
                return updateStats();
            }).catch(function (e) {
                console.error('添加生词失败:', e);
                showToast('❌ 添加失败');
            });
        }

            state.todayChecked = true;

            state.lastCheckinDate = new Date().toISOString().slice(0, 10);

        function updateCheckinUI() {

                html += '<span class="' + (i < stars ? 'done' : 'todo') + '">⭐</span>';

        // ============================================================

            var showWordMeaning = $('showWordMeaning') ? $('showWordMeaning').checked : true;

        function submitSentence() {
            var input = $('sentenceInput');
            if (!input) return;
            var text = input.value.trim();
            if (!text) { showToast('请写一句英文造句'); return; }
            var word = (state.sentences[0] || {}).originalText || '';
            var words = word.match(/\b[a-zA-Z']+\b/g);
            var wordKey = words ? words[0] : 'hello';
            var history = JSON.parse(localStorage.getItem('sentenceHistory') || '[]');
            history.push({ word: wordKey, sentence: text, time: new Date().toLocaleString() });
            localStorage.setItem('sentenceHistory', JSON.stringify(history.slice(-20)));
            input.value = '';
            showToast('✅ 造句已保存');
            loadSentenceHistory();
        }

        function loadSentenceHistory() {
            var container = $('sentenceHistory');
            if (!container) return;
            var history = JSON.parse(localStorage.getItem('sentenceHistory') || '[]');
            if (history.length === 0) {
                container.innerHTML = '<div style="color:#bbb;padding:8px 0;">还没有造句</div>';
                return;
            }
            var html = '';
            for (var i = history.length - 1; i >= 0; i--) {
                var item = history[i];
                html += '<div style="background:#f8faff;padding:8px 12px;border-radius:8px;margin-bottom:6px;">' +
                    '<span style="font-weight:600;color:var(--primary);">' + item.word + '</span> ' +
                    '<span style="color:#333;">' + item.sentence + '</span>' +
                    '<div style="font-size:11px;color:#999;margin-top:2px;">' + item.time + '</div></div>';
            }
            container.innerHTML = html;
        }

        function renderStats() {
            var total = Object.keys(LOCAL_DICT).length;
            var learned = state.learned ? state.learned.length : 0;
            var promise = getAllRecords('vocabulary');
            promise.then(function (vocab) {
                var vocabCount = vocab ? vocab.length : 0;
                var progress = total > 0 ? Math.round((learned / total) * 100) : 0;
                var html = '<div style="background:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow);">' +
                    '<div style="font-weight:700;font-size:18px;margin-bottom:16px;">📊 学习统计</div>' +
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' +
                    '<div style="background:var(--bg);padding:16px;border-radius:12px;text-align:center;">' +
                    '<div style="font-size:28px;font-weight:700;color:var(--primary);">' + total +
                    '</div><div style="font-size:13px;color:var(--text-light);">📚 词典总词</div></div>' +
                    '<div style="background:var(--bg);padding:16px;border-radius:12px;text-align:center;">' +
                    '<div style="font-size:28px;font-weight:700;color:#4caf50;">' + learned +
                    '</div><div style="font-size:13px;color:var(--text-light);">✅ 已学单词</div></div>' +
                    '<div style="background:var(--bg);padding:16px;border-radius:12px;text-align:center;">' +
                    '<div style="font-size:28px;font-weight:700;color:#f39c12;">' + vocabCount +
                    '</div><div style="font-size:13px;color:var(--text-light);">📝 生词本</div></div>' +
                    '<div style="background:var(--bg);padding:16px;border-radius:12px;text-align:center;">' +
                    '<div style="font-size:28px;font-weight:700;color:#e74c3c;">' + state.checkinDays +
                    '</div><div style="font-size:13px;color:var(--text-light);">🔥 连续打卡</div></div></div>' +
                    '<div style="margin-top:16px;background:var(--bg);border-radius:12px;padding:12px;">' +
                    '<div style="display:flex;justify-content:space-between;font-size:13px;"><span>学习进度</span><span>' +
                    progress + '%</span></div>' +
                    '<div style="height:8px;background:#ddd;border-radius:4px;margin-top:4px;overflow:hidden;">' +
                    '<div style="height:100%;width:' + progress +
                    '%;background:linear-gradient(90deg,var(--primary),#4caf50);border-radius:4px;transition:width 0.5s;"></div></div></div>' +
                    '<div style="font-size:12px;color:var(--text-light);margin-top:12px;text-align:center;">数据源: ' +
                    getApiSource() + '</div></div>';
                document.getElementById('lessonContent').innerHTML = html;
            });
        }

        // ============================================================
        // 设置面板
        // ============================================================
        function openSettings() {
            $('settingsPanel').classList.add('open');
            $('overlay').classList.add('show');
        }

        function closeSettings() {
            $('settingsPanel').classList.remove('open');
            $('overlay').classList.remove('show');
        }

        // ============================================================
        // API 测试
        // ============================================================
        function testApi() {
            var source = $('apiSource').value;
            var indicator = $('apiStatusIndicator');
            indicator.className = 'api-status checking';
            $('deepseekConfig').classList.toggle('hidden', source !== 'deepseek');

            if (source === 'local') {
                indicator.className = 'api-status online';
                return;
            }
            if (source === 'freedictionary') {
                fetch('https://api.dictionaryapi.dev/api/v2/entries/en/hello')
                    .then(function (r) {
                        indicator.className = r.ok ? 'api-status online' : 'api-status offline';
                    })
                    .catch(function () { indicator.className = 'api-status offline'; });
            }
            if (source === 'deepseek') {
                var key = $('deepseekKey') ? $('deepseekKey').value.trim() : '';
                indicator.className = key ? 'api-status online' : 'api-status offline';
            }
        }

        // ============================================================
        // 数据导出/导入
        // ============================================================
        function exportData() {
            var stores = ['textbooks', 'units', 'lessons', 'sentences', 'words', 'vocabulary'];
            var promises = stores.map(function (s) { return getAllRecords(s); });
            Promise.all(promises).then(function (results) {
                var data = {};
                stores.forEach(function (s, i) { data[s] = results[i]; });
                data.exportDate = new Date().toISOString();
                var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'english_learning_' + new Date().toISOString().slice(0, 10) + '.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('✅ 数据导出成功');
            }).catch(function (e) {
                console.error('导出失败:', e);
                showToast('❌ 导出失败');
            });
        }

        function importData() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function (event) {
                    try {
                        var data = JSON.parse(event.target.result);
                        if (!confirm('确认导入数据吗？')) return;
                        var stores = ['textbooks', 'units', 'lessons', 'sentences', 'words', 'vocabulary'];
                        var promise = Promise.resolve();
                        stores.forEach(function (key) {
                            promise = promise.then(function () {
                                return clearStore(key);
                            });
                            if (data[key]) {
                                data[key].forEach(function (item) {
                                    promise = promise.then(function () {
                                        return addRecord(key, item);
                                    });
                                });
                            }
                        });
                        promise.then(function () {
                            showToast('✅ 数据导入成功');
                            loadTextbooks();
                        }).catch(function (e) {
                            console.error('导入失败:', e);
                            showToast('❌ 导入失败');
                        });
                    } catch (e) {
                        console.error('解析失败:', e);
                        showToast('❌ 文件格式错误');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAllData() {
            if (!confirm('⚠️ 确认清空所有数据吗？此操作不可恢复！')) return;
            var stores = ['textbooks', 'units', 'lessons', 'sentences', 'words', 'vocabulary', 'studyRecords'];
            var promise = Promise.resolve();
            stores.forEach(function (key) {
                promise = promise.then(function () {
                    return clearStore(key);
                });
            });
            promise.then(function () {
                state.wordCache = {};
                localStorage.removeItem('english_state');
                localStorage.removeItem('sentenceHistory');
                showToast('✅ 所有数据已清空');
                loadTextbooks();
                updateStats();
            }).catch(function (e) {
                console.error('清空失败:', e);
                showToast('❌ 清空失败');
            });
        }

        // ============================================================
        // 状态持久化
        // ============================================================
        function saveState() {
            try {
                localStorage.setItem('english_state', JSON.stringify({
                    learned: state.learned || [],
                    checkinDays: state.checkinDays || 0,
                    lastCheckinDate: state.lastCheckinDate || null,
                    todayChecked: state.todayChecked || false,
                }));
            } catch (e) { /* ignore */ }
        }

        function loadState() {
            try {
                var data = JSON.parse(localStorage.getItem('english_state') || '{}');
                state.learned = data.learned || [];
                state.checkinDays = data.checkinDays || 0;
                state.lastCheckinDate = data.lastCheckinDate || null;
                var today = new Date().toISOString().slice(0, 10);
                state.todayChecked = state.lastCheckinDate === today;
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        // Toast
        // ============================================================
        var toastTimer = null;

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () {
                toastEl.classList.remove('show');
            }, 2000);
        }

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            loadState();

            // 初始化数据库和种子数据
            seedDatabase().then(function () {
                return loadTextbooks();
            }).then(function () {
                return initVoices();
            }).then(function () {
                updateCheckinUI();
                updateStats();
                testApi();
                // 默认查询
                setTimeout(queryWordUI, 500);
                // 如果有课文，加载第一个
                if (state.lessons && state.lessons.length > 0) {
                    state.currentLessonId = state.lessons[0].id;
                    loadLessonContent(state.currentLessonId);
                }
                // 绑定事件
                var contentInput = $('contentInput');
                if (contentInput) {
                    // 处理内容按钮
                }
                // 自动保存
                setInterval(saveState, 10000);
                window.addEventListener('beforeunload', saveState);
                console.log('📚 英语智能学习系统已启动');
                console.log('📝 本地词汇量:', Object.keys(LOCAL_DICT).length);
                console.log('🔗 数据源:', getApiSource());
            }).catch(function (e) {
                console.error('启动失败:', e);
            });

            // 绑定事件
            document.addEventListener('DOMContentLoaded', function () {
                var apiSource = $('apiSource');
                if (apiSource) {
                    apiSource.addEventListener('change', testApi);
                }
                var apiInput = $('apiWordInput');
                if (apiInput) {
                    apiInput.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter') queryWordUI();
                    });
                }
                // DeepSeek key 变化时更新状态
                var deepseekKey = $('deepseekKey');
                if (deepseekKey) {
                    deepseekKey.addEventListener('input', testApi);
                }
            });
        }

        // 暴露全局函数
        window.queryWordUI = queryWordUI;
        window.queryWord = queryWord;
        window.processContent = processContent;
        window.loadLesson = loadLesson;
        window.onTextbookChange = onTextbookChange;
        window.onUnitChange = onUnitChange;
        window.onLessonChange = onLessonChange;
        window.nextSentence = nextSentence;
        window.prevSentence = prevSentence;
        window.speakSentence = speakSentence;
        window.speakWord = speakWord;
        window.speakAll = speakAll;
        window.stopSpeaking = stopSpeaking;
        window.doCheckin = doCheckin;
        window.switchTab = switchTab;
        window.openSettings = openSettings;
        window.closeSettings = closeSettings;
        window.showToast = showToast;
        window.previewVoice = previewVoice;
        window.addToVocabulary = addToVocabulary;
        window.removeVocabItem = removeVocabItem;
        window.submitSentence = submitSentence;
        window.applyDisplaySettings = applyDisplaySettings;
        window.testApi = testApi;
        window.exportData = exportData;
        window.importData = importData;
        window.clearAllData = clearAllData;
        window.copySentence = copySentence;

        // 启动
        init();
    </script>

</body>
</html>
