        container.addEventListener('touchstart', function (e) {
            startTouchX = e.touches[0].clientX;
            isSwiping = true;
            isDragging = true;
        }, { passive: true });

        container.addEventListener('touchmove', function (e) {
            if (!isSwiping) return;
            currentTouchX = e.touches[0].clientX;
            var diff = currentTouchX - startTouchX;
            var offset = -currentIndex * 100 + (diff / window.innerWidth * 100);
            wrapper.style.transform = 'translateX(' + offset + '%)';
            wrapper.style.transition = 'none';
        }, { passive: true });

        container.addEventListener('touchend', function (e) {
            if (!isSwiping) return;
            isSwiping = false;
            isDragging = false;
            var diff = currentTouchX - startTouchX;
            var threshold = 50;
            if (diff < -threshold && currentIndex < state.sentences.length - 1) { goToNext(); }
            else if (diff > threshold && currentIndex > 0) { goToPrev(); }
            else { goToSentence(currentIndex); }
            startTouchX = 0;
            currentTouchX = 0;
        }, { passive: true });

        var wheelTimeout = false;
        container.addEventListener('wheel', function (e) {
            if (isDragging) return;
            if (wheelTimeout) return;
            wheelTimeout = true;
            setTimeout(function () { wheelTimeout = false; }, 600);
            if (e.deltaY > 0 && currentIndex < state.sentences.length - 1) { goToNext(); }
            else if (e.deltaY < 0 && currentIndex > 0) { goToPrev(); }
        }, { passive: true });

        // ============================================================

        function getApiSource() {

        function queryWord(word) {
            var lower = word.toLowerCase().trim();
            if (!lower) return Promise.resolve(null);
            var source = getApiSource();
            var cacheKey = source + '_' + lower;
            if (state.wordCache[cacheKey]) return Promise.resolve(state.wordCache[cacheKey]);
            var local = getWordData(lower);
            if (local) {
                local.source = 'local';
                state.wordCache[cacheKey] = local;
                return Promise.resolve(local);
            }
            if (source === 'local') return Promise.resolve(null);
            if (source === 'freedictionary') {
                return fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + lower)
                    .then(function (response) {
                        if (!response.ok) throw new Error('Word not found');
                        return response.json();
                    })
                    .then(function (data) {
                        if (!data || data.length === 0) return null;
                        var entry = data[0];
                        var phonetic = entry.phonetic || '';
                        if (!phonetic && entry.phonetics) {
                            var found = entry.phonetics.find(function (p) { return p.text; });
                            if (found) phonetic = found.text;
                        }
                        var meaning = '';
                        var pos = '';
                        if (entry.meanings && entry.meanings.length > 0) {
                            var first = entry.meanings[0];
                            pos = first.partOfSpeech || '';
                            if (first.definitions && first.definitions.length > 0) {
                                meaning = first.definitions[0].definition;
                            }
                        }
                        var result = {
                            word: lower, phonetic: phonetic || '/' + lower + '/',
                            meaning: meaning || '未知词义', pos: pos || '', source: 'freedictionary'
                        };
                        state.wordCache[cacheKey] = result;
                        return result;
                    })
                    .catch(function () { return null; });
            }
            if (source === 'deepseek') {
                var apiKey = document.getElementById('deepseekKey') ? document.getElementById('deepseekKey').value.trim() : '';
                if (!apiKey) return Promise.resolve(null);
                var apiUrl = document.getElementById('deepseekUrl') ? document.getElementById('deepseekUrl').value :
                    'https://api.deepseek.com/v1/chat/completions';
                var model = document.getElementById('deepseekModel') ? document.getElementById('deepseekModel').value :
                    'deepseek-chat';
                var prompt = '请为英语单词 "' + lower + '" 提供以下信息，以JSON格式返回（只返回JSON）：\n' +
                    '{\n    "word": "' + lower + '",\n    "phonetic": "国际音标",\n    "meaning": "中文释义",\n    "pos": "词性"\n}';
                return fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: '你是一个英语词典助手，只返回JSON格式数据。' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.3,
                        max_tokens: 200
                    })
                }).then(function (response) {
                    if (!response.ok) return response.text().then(function (text) {
                        throw new Error('API错误: ' +
                            text);
                    });
                    return response.json();
                }).then(function (data) {
                    var content = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0]
                        .message.content : '';
                    try {
                        var parsed = JSON.parse(content);
                        var result = {
                            word: parsed.word || lower, phonetic: parsed.phonetic || '/' + lower + '/',
                            meaning: parsed.meaning || '未知词义', pos: parsed.pos || '', source: 'deepseek'
                        };
                        state.wordCache[cacheKey] = result;
                        return result;
                    } catch (e) { return null; }
                }).catch(function () { return null; });
            }
            return Promise.resolve(null);
        }

        // ============================================================
        // 文本渲染
        // ============================================================
        function splitSyllables(word) {
            var vowels = ['a', 'e', 'i', 'o', 'u', 'y'];
            var syls = [];
            var current = '';
            for (var i = 0; i < word.length; i++) {
                current += word[i];
                if (vowels.indexOf(word[i].toLowerCase()) !== -1 && i < word.length - 1 &&
                    vowels.indexOf(word[i + 1].toLowerCase()) === -1) {
                    syls.push(current);
                    current = '';
                }
            }
            if (current) syls.push(current);
            return syls.length > 0 ? syls : [word];
        }

        function colorizeText(text, unknownWords) {
            var parts = text.split(/(\s+|[^\w']+)/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < parts.length; i++) {
                var part = parts[i];
                if (!part) continue;
                if (/^\s+$/.test(part) || /[^\w']/.test(part)) { result += part; continue; }
                var isUnknown = unknownWords && unknownWords.indexOf(part.toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-word' : '';
                var syllables = splitSyllables(part);
                var colored = '';
                for (var si = 0; si < syllables.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + part +
                        '">' + syllables[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += colored;
            }
            return result;
        }

        function colorizePhonetics(phonetic, original, unknownWords) {
            if (!phonetic) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var phoneticParts = phonetic.split(/\s+/);
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= phoneticParts.length) break;
                var isUnknown = unknownWords && unknownWords.indexOf(words[i].toLowerCase()) !== -1;
                var unknownClass = isUnknown ? 'unknown-phonetic' : '';
                var clean = phoneticParts[i].replace(/^\/|\/$/g, '');
                var syls = splitSyllables(clean);
                var colored = '';
                for (var si = 0; si < syls.length; si++) {
                    colored += '<span class="syllable-' + colorIdx + ' ' + unknownClass + '" data-word="' + words[i] +
                        '">' + syls[si] + '</span>';
                    colorIdx = colorIdx % 8 + 1;
                }
                result += '/' + colored + '/ ';
            }
            return result;
        }

        function colorizeMeanings(meanings, original) {
            if (!meanings) return '';
            var words = original.match(/\b[a-zA-Z']+\b/g) || [];
            var meaningList = meanings.split('; ');
            var result = '';
            var colorIdx = 1;
            for (var i = 0; i < words.length; i++) {
                if (i >= meaningList.length) break;
                result += '<span class="syllable-' + colorIdx + '" data-word="' + words[i] + '">' + meaningList[i] +
                    '</span>; ';
                colorIdx = colorIdx % 8 + 1;
            }
            return result;
        }

        function generateTranslation(text) {
            var words = text.match(/\b[a-zA-Z']+\b/g) || [];
            var meanings = [];
            for (var i = 0; i < words.length; i++) {
                var data = getWordData(words[i]);
                if (data) meanings.push(data.meaning);
            }
            if (meanings.length === 0) return '📖 ' + text + ' (参考翻译)';
            var result = meanings.join(' ');
            if (result.length > 60) result = result.substring(0, 60) + '...';
            return '📖 ' + result;
        }

        // ============================================================
        // 朗读句子
        // ============================================================
        var isReadingSentence = false;

        function readSentence(index) {
            if (index < 0 || index >= state.sentences.length) {
                if (isPlaying) {
                    stopPlay();
                    showToast('🎉 全部朗读完成！');
                }
                return;
            }
            if (isReadingSentence) return;
            isReadingSentence = true;

            var sentence = state.sentences[index];
            if (!sentence) { isReadingSentence = false; return; }
            if (synth.speaking) {
                synth.cancel();
                clearHighlights(index);
                clearSyllableHighlights(index);
            }

            goToSentence(index);

            var block = document.getElementById('block-' + index);
            if (block) {
                block.classList.add('speaking');
                block.classList.remove('unread', 'read');
            }

            var cleanText = sentence.trim();
            var voice = getVoice('defaultVoice');
            var rate = parseFloat(document.getElementById('speechRate').value) || 0.8;

            var bar = document.getElementById('progress-bar-' + index);
            if (bar) bar.style.width = '0%';

            var originalEl = document.getElementById('original-' + index);
            var allSyllableElements = [];
            var allWords = cleanText.match(/\b[a-zA-Z']+\b/g) || [];

            if (originalEl) {
                var spans = originalEl.querySelectorAll('span[data-word]');
                allSyllableElements = Array.from(spans);
            }
            if (allSyllableElements.length === 0) {
                var wordSpans = originalEl ? originalEl.querySelectorAll('span[data-word]') : [];
                if (wordSpans.length > 0) { allSyllableElements = Array.from(wordSpans); }
                else if (originalEl) {
                    var textNodes = originalEl.childNodes;
                    var tempElements = [];
                    for (var i = 0; i < textNodes.length; i++) {
                        if (textNodes[i].nodeType === 3 && textNodes[i].textContent.trim()) {
                            var wrapper = document.createElement('span');
                            wrapper.textContent = textNodes[i].textContent;
                            wrapper.setAttribute('data-word', textNodes[i].textContent.trim());
                            textNodes[i].parentNode.replaceChild(wrapper, textNodes[i]);
                            tempElements.push(wrapper);
                        }
                    }
                    if (tempElements.length > 0) { allSyllableElements = tempElements; }
                }
            }

            var highlightIndex = 0;

            function resetAllSyllableHighlights() { clearSyllableHighlights(); }

            function speakTextWithHighlight(text, voice, rate, onEnd) {
                if (!text) return;
                if (synth.speaking) synth.cancel();

                var utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = rate || 0.8;
                if (voice) utterance.voice = voice;

                var wordIndex = 0;
                var wordMap = {};
                for (var i = 0; i < allWords.length; i++) {
                    var w = allWords[i].toLowerCase().replace(/[^a-z']/g, '');
                    wordMap[w] = wordMap[w] || [];
                    for (var j = 0; j < allSyllableElements.length; j++) {
                        var elWord = allSyllableElements[j].getAttribute('data-word');
                        if (elWord && elWord.toLowerCase().replace(/[^a-z']/g, '') === w) {
                            if (wordMap[w].indexOf(j) === -1) { wordMap[w].push(j); }
                        }
                    }
                }

                var usedIndices = {};

                utterance.onboundary = function (event) {
                    if (event.name === 'word') {
                        var currentWord = text.substring(event.charIndex, event.charIndex + event.charLength);
                        currentWord = currentWord.replace(/[^a-zA-Z']/g, '');
                        if (currentWord) {
                            highlightCurrentWord(currentWord, index);
                            var progress = (wordIndex + 1) / allWords.length * 100;
                            updateProgress(index, progress);

                            var wordLower = currentWord.toLowerCase().replace(/[^a-z']/g, '');
                            var matched = false;

                            if (wordMap[wordLower]) {
                                for (var mi = 0; mi < wordMap[wordLower].length; mi++) {
                                    var idx = wordMap[wordLower][mi];
                                    if (!usedIndices[idx]) {
                                        usedIndices[idx] = true;
                                        clearSyllableHighlights(index);
                                        var targetEl = allSyllableElements[idx];
                                        if (targetEl) { highlightSyllableElement(targetEl); }
                                        highlightIndex = idx + 1;
                                        matched = true;
                                        break;
                                    }
                                }
                            }

                            if (!matched) {
                                for (var i = highlightIndex; i < allSyllableElements.length; i++) {
                                    if (!usedIndices[i]) {
                                        usedIndices[i] = true;
                                        clearSyllableHighlights(index);
                                        var targetEl = allSyllableElements[i];
                                        if (targetEl) { highlightSyllableElement(targetEl); }
                                        highlightIndex = i + 1;
                                        matched = true;
                                        break;
                                    }
                                }
                            }

                            wordIndex++;
                        }
                    }
                };

                utterance.onend = function () {
                    resetAllSyllableHighlights();
                    clearHighlights(index);
                    updateProgress(index, 100);
                    if (block) {
                        block.classList.remove('speaking');
                        block.classList.add('read');
                    }
                    isReadingSentence = false;
                    if (onEnd) onEnd();
                };

                utterance.onerror = function () {
                    resetAllSyllableHighlights();
                    clearHighlights(index);
                    if (block) { block.classList.remove('speaking'); }
                    isReadingSentence = false;
                    if (onEnd) onEnd();
                };

                synth.speak(utterance);
            }

            speakTextWithHighlight(cleanText, voice, rate, function () {
                updateReadStats();

                if (autoPlay && isPlaying) {
                    var pause = parseInt(document.getElementById('sentencePause').value) || 800;

                    if (currentIndex < state.sentences.length - 1) {
                        setTimeout(function () {
                            if (isPlaying) {
                                stopPlay();
                                goToNext();
                                setTimeout(function () {
                                    if (state.sentences.length > 0 && currentIndex < state.sentences
                                        .length) {
                                        startPlay();
                                    }
                                }, 500);
                            }
                        }, pause);
                    } else {
                        setTimeout(function () {
                            if (isPlaying) {
                                stopPlay();
                                showToast('🎉 全部朗读完成！');
                            }
                        }, pause);
                    }
                } else {
                    if (isPlaying) { stopPlay(); }
                }
            });
        }

        // ============================================================
        // 高亮当前单词
        // ============================================================
        function highlightCurrentWord(word, sentenceIndex) {
            if (sentenceIndex === undefined || sentenceIndex < 0) return;
            clearHighlights(sentenceIndex);
            if (!word) return;

            var block = document.getElementById('block-' + sentenceIndex);
            if (!block) return;
            var wordLower = word.toLowerCase().replace(/[^a-z']/g, '');

            var originalEl = document.getElementById('original-' + sentenceIndex);
            if (originalEl) {
                var spans = originalEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < spans.length; i++) {
                    var span = spans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-word');
                    }
                }
            }

            var phoneticEl = document.getElementById('phonetic-' + sentenceIndex);
            if (phoneticEl) {
                var pSpans = phoneticEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < pSpans.length; i++) {
                    var span = pSpans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-phonetic');
                    }
                }
            }

            var meaningEl = document.getElementById('meaning-' + sentenceIndex);
            if (meaningEl) {
                var mSpans = meaningEl.querySelectorAll('span[data-word]');
                for (var i = 0; i < mSpans.length; i++) {
                    var span = mSpans[i];
                    var spanWord = span.getAttribute('data-word');
                    if (spanWord && spanWord.toLowerCase().replace(/[^a-z']/g, '') === wordLower) {
                        span.classList.add('highlight-meaning');
                    }
                }
            }

            state.currentWord = word;
            state.currentSentenceIndex = sentenceIndex;
        }

        function clearHighlights(sentenceIndex) {
            if (sentenceIndex === undefined) {
                document.querySelectorAll('.highlight-word, .highlight-phonetic, .highlight-meaning')
                    .forEach(function (el) {
                        el.classList.remove('highlight-word', 'highlight-phonetic',
                            'highlight-meaning');
                    });
                return;
            }
            var block = document.getElementById('block-' + sentenceIndex);
            if (!block) return;
            block.querySelectorAll('.highlight-word, .highlight-phonetic, .highlight-meaning')
                .forEach(function (el) {
                    el.classList.remove('highlight-word', 'highlight-phonetic',
                        'highlight-meaning');
                });
        }

        function updateProgress(sentenceIndex, percent) {
            var bar = document.getElementById('progress-bar-' + sentenceIndex);
            var progress = document.getElementById('progress-' + sentenceIndex);
            if (bar) { bar.style.width = Math.min(100, percent) + '%'; }
            if (progress && percent > 0 && percent < 100) { progress.classList.add('active'); }
            if (percent >= 100) { progress.classList.remove('active'); }
        }

        // ============================================================
        // 添加生词
        // ============================================================
        function addWordToVocab(index) {
            if (index < 0 || index >= state.sentences.length) return;
            var sentence = state.sentences[index];
            var words = sentence.match(/\b[a-zA-Z']+\b/g) || [];
            var added = 0;
            for (var i = 0; i < words.length; i++) {
                var word = words[i].toLowerCase();
                if (state.vocabulary.indexOf(word) === -1) {
                    state.vocabulary.push(word);
                    added++;
                }
            }
            saveState();
            showToast('✅ 已添加 ' + added + ' 个单词到生词本');
            updateStats();
        }

        function removeVocabItem(word) {
            var idx = state.vocabulary.indexOf(word);
            if (idx !== -1) {
                state.vocabulary.splice(idx, 1);
                saveState();
                showToast('🗑️ 已移除: ' + word);
                renderVocab();
            }
        }

        function colorizeVocabWord(word) {
            var syllables = splitSyllables(word);
            var colorIdx = 1;
            var colored = '';
            for (var si = 0; si < syllables.length; si++) {
                colored += '<span class="syllable-' + colorIdx + '">' + syllables[si] + '</span>';
                colorIdx = colorIdx % 8 + 1;
            }
            return colored;
        }

        // ============================================================
        // 生词本发音（带音节高亮）
        // ============================================================
        function speakVocabWord(word) {
            if (!word) return;
            if (synth.speaking) synth.cancel();

            document.querySelectorAll('.speaking-active, .speaking-glow, .speaking-wave, .speaking-icon, .highlight-syllable')
                .forEach(function (el) {
                    el.classList.remove('speaking-active', 'speaking-glow', 'speaking-wave', 'speaking-icon',
                        'highlight-syllable');
                    el.style.background = '';
                    el.style.color = '';
                    el.style.borderRadius = '';
                    el.style.padding = '';
                    el.style.fontWeight = '';
                    el.style.boxShadow = '';
                    el.style.transform = '';
                });

            var wordClass = 'vocab-word-' + word.replace(/[^a-zA-Z]/g, '');
            var wordElements = document.querySelectorAll('.' + wordClass);
            var parentDiv = null;
            var allSyllables = [];

            if (wordElements.length > 0) {
                parentDiv = wordElements[0].closest('.vocab-item');
                var syllableSpans = wordElements[0].querySelectorAll('span');
                if (syllableSpans.length > 0) { allSyllables = Array.from(syllableSpans); }
                else { allSyllables = [wordElements[0]]; }
                if (parentDiv) {
                    parentDiv.classList.add('speaking-active');
                    parentDiv.classList.add('speaking-glow');
                }
                var icon = parentDiv ? parentDiv.querySelector('.speaking-icon') : null;
                if (icon) { icon.classList.add('speaking-icon'); }
            }

            var utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = parseFloat(document.getElementById('speechRate').value) || 0.8;
            var voice = getVoice('defaultVoice');
            if (voice) utterance.voice = voice;

            var syllableIndex = 0;
            var totalSyllables = allSyllables.length;

            function clearSyllableHighlightsVocab() {
                allSyllables.forEach(function (el) {
                    el.classList.remove('highlight-syllable');
                    el.style.background = '';
                    el.style.color = '';
                    el.style.borderRadius = '';
                    el.style.padding = '';
                    el.style.fontWeight = '';
                    el.style.boxShadow = '';
                    el.style.transform = '';
                });
            }

            function highlightSyllableVocab(idx) {
                clearSyllableHighlightsVocab();
                var target = allSyllables[idx % totalSyllables];
                if (target) {
                    target.classList.add('highlight-syllable');
                    target.style.background = '#ffeb3b';
                    target.style.color = '#1a2332';
                    target.style.borderRadius = '4px';
                    target.style.padding = '0 4px';
                    target.style.fontWeight = '800';
                    target.style.boxShadow = '0 0 16px rgba(255,235,59,0.7)';
                    target.style.transform = 'scale(1.1)';
                }
            }

            if (totalSyllables > 1) {
                utterance.onboundary = function (event) {
                    if (event.name === 'word') {
                        highlightSyllableVocab(syllableIndex);
                        syllableIndex++;
                    }
                };
            }

            utterance.onstart = function () {
                showToast('🔊 发音: ' + word);
                if (totalSyllables > 0) {
                    highlightSyllableVocab(0);
                    syllableIndex = 1;
                }
            };

            utterance.onend = function () {
                clearSyllableHighlightsVocab();
                document.querySelectorAll('.speaking-active, .speaking-glow, .speaking-wave, .speaking-icon')
                    .forEach(function (el) {
                        el.classList.remove('speaking-active', 'speaking-glow',
                            'speaking-wave', 'speaking-icon');
                    });
                syllableIndex = 0;
            };

            utterance.onerror = function () {
                clearSyllableHighlightsVocab();
                document.querySelectorAll('.speaking-active, .speaking-glow, .speaking-wave, .speaking-icon')
                    .forEach(function (el) {
                        el.classList.remove('speaking-active', 'speaking-glow',
                            'speaking-wave', 'speaking-icon');
                    });
                syllableIndex = 0;
            };

            synth.speak(utterance);
        }

        // 生词本渲染
        // ============================================================

                '</span> / <span id="vocabTotalCount">' + state.vocabulary.length + '</span></div>';
            html += '<div class="auto-toggle"><span>🔁 自动朗读</span><input type="checkbox" id="vocabAutoPlayToggle" checked></div>';
            html += '</div>';
            html += '<div class="btn-group">';
            html += '<button class="icon-btn" onclick="vocabGoToPrev()">◀</button>';
            html += '<button class="primary" id="vocabPlayBtn" onclick="vocabTogglePlay()">▶ 朗读</button>';
            html += '<button class="icon-btn" onclick="vocabGoToNext()">▶</button>';
            html += '<button class="icon-btn" onclick="vocabStopPlay()" style="color:#e74c3c;">⏹</button>';
            html += '</div></div>';

            container.innerHTML = html;

            var autoToggle = document.getElementById('vocabAutoPlayToggle');
            if (autoToggle) {
                autoToggle.addEventListener('change', function () {
                    vocabAutoPlay = this.checked;
                    showToast(vocabAutoPlay ? '🔁 自动朗读已开启' : '🔁 自动朗读已关闭');
                });
            }

            setTimeout(function () {
                initVocabSwipe();
                vocabGoToSentence(vocabIndex);
            }, 100);

            updateVocabControls();
        }

        // ============================================================
        // 生词本导航
        // ============================================================
        function vocabGoToSentence(index) {
            if (index < 0 || index >= state.vocabulary.length) return;
            vocabIndex = index;
            var wrapper = document.getElementById('vocabWrapper');
            if (!wrapper) return;
            var offset = -index * 100;
            wrapper.style.transform = 'translateX(' + offset + '%)';
            wrapper.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            var currentEl = document.getElementById('vocabCurrentIndex');
            if (currentEl) currentEl.textContent = index + 1;
            updateVocabControls();

            var blocks = document.querySelectorAll('#vocabContainer .sentence-block');
            for (var i = 0; i < blocks.length; i++) {
                if (i === index) { blocks[i].classList.add('speaking'); }
                else { blocks[i].classList.remove('speaking'); }
            }

            if (vocabAutoPlay) {
                if (synth.speaking) { synth.cancel(); }
                vocabIsPlaying = true;
                var btn = document.getElementById('vocabPlayBtn');
                if (btn) {
                    btn.textContent = '⏸ 暂停';
                    btn.classList.add('speaking-btn');
                }
                document.querySelectorAll('.highlight-syllable').forEach(function (el) {
                    el.classList.remove('highlight-syllable');
                    el.style.background = '';
                    el.style.color = '';
                    el.style.borderRadius = '';
                    el.style.padding = '';
                    el.style.fontWeight = '';
                    el.style.boxShadow = '';
                    el.style.transform = '';
                });
                setTimeout(function () {
                    vocabReadWord(vocabIndex);
                }, 450);
            }
        }

        function vocabGoToNext() {
            if (vocabIndex < state.vocabulary.length - 1) {
                vocabGoToSentence(vocabIndex + 1);
            } else {
                showToast('🎉 已经是最后一个生词了');
                if (vocabAutoPlay && vocabIsPlaying) {
                    vocabStopPlay();
                    showToast('🎉 全部生词朗读完成！');
                }
            }
        }

        function vocabGoToPrev() {
            if (vocabIndex > 0) {
                vocabGoToSentence(vocabIndex - 1);
            } else { showToast('👋 已经是第一个生词了'); }
        }

        function updateVocabControls() {
            var total = state.vocabulary.length;
            var totalEl = document.getElementById('vocabTotalCount');
            var currentEl = document.getElementById('vocabCurrentIndex');
            if (totalEl) totalEl.textContent = total;
            if (currentEl && total > 0) currentEl.textContent = vocabIndex + 1;
        }

        // ============================================================
        // 生词本滑动切换
        // ============================================================
        function initVocabSwipe() {
            var container = document.getElementById('vocabContainer');
            if (!container) return;

            var wrapper = document.getElementById('vocabWrapper');
            var startX = 0;
            var currentX = 0;
            var isSwiping = false;

            container.addEventListener('touchstart', function (e) {
                startX = e.touches[0].clientX;
                isSwiping = true;
            }, { passive: true });

            container.addEventListener('touchmove', function (e) {
                if (!isSwiping) return;
                currentX = e.touches[0].clientX;
                var diff = currentX - startX;
                var offset = -vocabIndex * 100 + (diff / window.innerWidth * 100);
                wrapper.style.transform = 'translateX(' + offset + '%)';
                wrapper.style.transition = 'none';
            }, { passive: true });

            container.addEventListener('touchend', function (e) {
                if (!isSwiping) return;
                isSwiping = false;
                var diff = currentX - startX;
                var threshold = 50;
                if (diff < -threshold && vocabIndex < state.vocabulary.length - 1) {
                    vocabGoToNext();
                } else if (diff > threshold && vocabIndex > 0) {
                    vocabGoToPrev();
                } else {
                    vocabGoToSentence(vocabIndex);
                }
                startX = 0;
                currentX = 0;
            }, { passive: true });
        }

        // ============================================================
        // 生词本朗读控制
        // ============================================================
        function vocabTogglePlay() {
            if (vocabIsPlaying) { vocabStopPlay(); }
            else { vocabStartPlay(); }
        }

        function vocabStartPlay() {
            if (state.vocabulary.length === 0) { showToast('生词本是空的'); return; }
            if (synth.speaking) synth.cancel();
            vocabIsPlaying = true;
            vocabIsReading = false;
            var btn = document.getElementById('vocabPlayBtn');
            if (btn) {
                btn.textContent = '⏸ 暂停';
                btn.classList.add('speaking-btn');
            }
            vocabReadWord(vocabIndex);
        }

        function vocabStopPlay() {
            if (synth.speaking) synth.cancel();
            vocabIsPlaying = false;
            vocabIsReading = false;
            var btn = document.getElementById('vocabPlayBtn');
            if (btn) {
                btn.textContent = '▶ 朗读';
                btn.classList.remove('speaking-btn');
            }
            document.querySelectorAll('.highlight-syllable').forEach(function (el) {
                el.classList.remove('highlight-syllable');
                el.style.background = '';
                el.style.color = '';
                el.style.borderRadius = '';
                el.style.padding = '';
                el.style.fontWeight = '';
                el.style.boxShadow = '';
                el.style.transform = '';
            });
            var block = document.getElementById('vocab-block-' + vocabIndex);
            if (block) { block.classList.remove('speaking'); }
        }

        function vocabReadWord(index) {
            if (index < 0 || index >= state.vocabulary.length) {
                if (vocabIsPlaying) {
                    vocabStopPlay();
                    showToast('🎉 全部生词朗读完成！');
                }
                return;
            }
            if (vocabIsReading) return;
            vocabIsReading = true;

            var word = state.vocabulary[index];
            if (!word) { vocabIsReading = false; return; }

            vocabGoToSentence(index);

            var block = document.getElementById('vocab-block-' + index);
            if (block) { block.classList.add('speaking'); }

            var wordClass = 'vocab-word-' + word.replace(/[^a-zA-Z]/g, '');
            var wordElements = document.querySelectorAll('.' + wordClass);
            var allSyllables = [];

            if (wordElements.length > 0) {
                var syllableSpans = wordElements[0].querySelectorAll('span');
                if (syllableSpans.length > 0) { allSyllables = Array.from(syllableSpans); }
                else { allSyllables = [wordElements[0]]; }
            }

            var syllableIndex = 0;
            var totalSyllables = allSyllables.length;

            function clearSyllableHighlights() {
                allSyllables.forEach(function (el) {
                    el.classList.remove('highlight-syllable');
                    el.style.background = '';
                    el.style.color = '';
                    el.style.borderRadius = '';
                    el.style.padding = '';
                    el.style.fontWeight = '';
                    el.style.boxShadow = '';
                    el.style.transform = '';
                });
            }

            function highlightSyllable(idx) {
                clearSyllableHighlights();
                var target = allSyllables[idx % totalSyllables];
                if (target) {
                    target.classList.add('highlight-syllable');
                    target.style.background = '#ffeb3b';
                    target.style.color = '#1a2332';
                    target.style.borderRadius = '4px';
                    target.style.padding = '0 4px';
                    target.style.fontWeight = '800';
                    target.style.boxShadow = '0 0 16px rgba(255,235,59,0.7)';
                    target.style.transform = 'scale(1.1)';
                }
            }

            var utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = parseFloat(document.getElementById('speechRate').value) || 0.8;
            var voice = getVoice('defaultVoice');
            if (voice) utterance.voice = voice;

            if (totalSyllables > 1) {
                utterance.onboundary = function (event) {
                    if (event.name === 'word') {
                        highlightSyllable(syllableIndex);
                        syllableIndex++;
                    }
                };
            }

            utterance.onstart = function () {
                if (totalSyllables > 0) {
                    highlightSyllable(0);
                    syllableIndex = 1;
                }
            };

            utterance.onend = function () {
                clearSyllableHighlights();
                if (block) { block.classList.remove('speaking'); }
                vocabIsReading = false;

                if (vocabAutoPlay && vocabIsPlaying) {
                    var pause = 800;
                    setTimeout(function () {
                        if (vocabIsPlaying) {
                            vocabStopPlay();
                            vocabGoToNext();
                            setTimeout(function () {
                                if (vocabIsPlaying) {
                                    vocabReadWord(vocabIndex);
                                }
                            }, 500);
                        }
                    }, pause);
                } else {
                    if (vocabIsPlaying) { vocabStopPlay(); }
                }
            };

            utterance.onerror = function () {
                clearSyllableHighlights();
                if (block) { block.classList.remove('speaking'); }
                vocabIsReading = false;
                if (vocabIsPlaying) { vocabStopPlay(); }
            };

            synth.speak(utterance);
        }

        // ============================================================
        // 造句
        // ============================================================
        function renderWrite() {
            var container = document.getElementById('contentContainer');
            var currentWord = state.sentences.length > 0 ?
                (state.sentences[0].match(/\b[a-zA-Z']+\b/g) || ['hello'])[0] :
                'hello';
            var html = '<div class="page-content">' +
                '<div class="title">✍️ 造句练习</div>' +
                '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:var(--shadow);">' +
                '<div style="font-size:22px;font-weight:600;color:var(--primary);margin-bottom:10px;">' + currentWord +

        function submitSentence() {
            var input = document.getElementById('sentenceInput');
            if (!input) return;
            var text = input.value.trim();
            if (!text) { showToast('请写一句英文造句'); return; }
            var word = (state.sentences[0] || '').match(/\b[a-zA-Z']+\b/g)?.[0] || 'hello';
            var history = JSON.parse(localStorage.getItem('sentenceHistory') || '[]');
            history.push({ word: word, sentence: text, time: new Date().toLocaleString() });
            localStorage.setItem('sentenceHistory', JSON.stringify(history.slice(-20)));
            input.value = '';
            showToast('✅ 造句已保存');
            loadSentenceHistory();
        }

        function loadSentenceHistory() {
            var container = document.getElementById('sentenceHistory');

            if (history.length === 0) {
                container.innerHTML = '<div style="color:#bbb;padding:8px 0;">还没有造句</div>';
                return;

            var html = '';
            for (var i = history.length - 1; i >= 0; i--) {

                html += '<div style="background:#f8faff;padding:8px 12px;border-radius:8px;margin-bottom:6px;">' +

        // ============================================================
        // 从句子中提取高频词
        // ============================================================
        function aiExtractWords(sentences, maxWords) {
            maxWords = maxWords || 15;
            var wordFreq = {};

            for (var i = 0; i < sentences.length; i++) {
                var words = sentences[i].match(/\b[a-zA-Z']+\b/g) || [];
                for (var j = 0; j < words.length; j++) {
                    var w = words[j].toLowerCase();
                    if (AI_STOP_WORDS.indexOf(w) === -1 && w.length > 1 && !/^\d+$/.test(w)) {
                        wordFreq[w] = (wordFreq[w] || 0) + 1;
                    }
                }
            }

            var sorted = Object.keys(wordFreq).sort(function (a, b) {
                return wordFreq[b] - wordFreq[a];
            });

            return sorted.slice(0, maxWords);
        }

        // ============================================================
        // 从句子中找包含目标词的句子
        // ============================================================
        function aiFindSentencesWithTarget(sentences, target) {
            var result = [];
            var used = {};
            for (var i = 0; i < sentences.length; i++) {
                var s = sentences[i];
                var words = s.toLowerCase().match(/\b[a-zA-Z']+\b/g) || [];
                if (words.indexOf(target) !== -1) {
                    var key = s.trim();
                    if (!used[key]) {
                        used[key] = true;
                        result.push(s);
                    }
                }
            }
            return result;
        }

        // ============================================================
        // 生成干扰项（选择题用）
        // ============================================================
        function aiGenerateDistractors(target, count) {
            count = count || 3;
            var pool = Object.keys(AI_DICTIONARY);
            var result = [];
            var used = [target];

            var shuffled = pool.slice().sort(function () { return Math.random() - 0.5; });

            for (var i = 0; i < shuffled.length && result.length < count; i++) {
                var word = shuffled[i];
                if (used.indexOf(word) === -1 && word !== target) {
                    result.push(word);
                    used.push(word);
                }
            }

            while (result.length < count) {
                result.push('unknown');
            }

            return result;
        }

        // ============================================================
        // 核心：生成题目（基于课文句子）
        // ============================================================
        function aiGenerateQuestions(sentences, count) {
            count = count || 5;

            if (!sentences || sentences.length === 0) {
                // 默认句子池
                sentences = [
                    'Hello! My name is Li Ming.',
                    'I am a student.',
                    'I like English.',
                    'Nice to meet you.',
                    'How are you today?',
                    'The weather is nice.',
                    'I have a cat.',
                    'She is my friend.',
                    'This is my classroom.',
                    'We are in Grade Four.'
                ];
            }

            // 1. 提取高频词
            var topWords = aiExtractWords(sentences, 12);

            // 如果高频词不够，补充默认词
            var defaultWords = ['hello', 'name', 'student', 'like', 'english', 'friend', 'teacher', 'school', 'book', 'cat'];
            while (topWords.length < 6) {
                for (var i = 0; i < defaultWords.length && topWords.length < 6; i++) {
                    if (topWords.indexOf(defaultWords[i]) === -1) {
                        topWords.push(defaultWords[i]);
                    }
                }
                break;
            }

            // 2. 为每个目标词找包含它的句子
            var questionPool = [];
            for (var i = 0; i < topWords.length; i++) {
                var target = topWords[i];
                var matchedSentences = aiFindSentencesWithTarget(sentences, target);
                for (var j = 0; j < matchedSentences.length && questionPool.length < count * 2; j++) {
                    questionPool.push({
                        sentence: matchedSentences[j],
                        target: target
                    });
                }
            }

            // 如果还不够，用随机句子+随机词
            if (questionPool.length < count) {
                var shuffledSentences = sentences.slice().sort(function () { return Math.random() - 0.5; });
                for (var i = 0; i < shuffledSentences.length && questionPool.length < count; i++) {
                    var s = shuffledSentences[i];
                    var words = s.match(/\b[a-zA-Z']+\b/g) || [];
                    var validWords = [];
                    for (var j = 0; j < words.length; j++) {
                        var w = words[j].toLowerCase();
                        if (AI_STOP_WORDS.indexOf(w) === -1 && w.length > 1) {
                            validWords.push(w);
                        }
                    }
                    if (validWords.length > 0) {
                        var target = validWords[Math.floor(Math.random() * validWords.length)];
                        var exists = false;
                        for (var k = 0; k < questionPool.length; k++) {
                            if (questionPool[k].target === target && questionPool[k].sentence === s) {
                                exists = true;
                                break;
                            }
                        }
                        if (!exists) {
                            questionPool.push({ sentence: s, target: target });
                        }
                    }
                }
            }

            // 3. 打乱并选取 count 个
            var shuffledPool = questionPool.slice().sort(function () { return Math.random() - 0.5; });
            var selected = shuffledPool.slice(0, Math.min(count, shuffledPool.length));

            // 如果还不够，补默认题目
            while (selected.length < count) {
                var defaultSentences = [
                    'Hello! My name is Li Ming.',
                    'I am a student.',
                    'I like English.',
                    'Nice to meet you.'
                ];
                var defaultTargets = ['hello', 'student', 'like', 'meet'];
                var idx = selected.length % defaultSentences.length;
                selected.push({
                    sentence: defaultSentences[idx],
                    target: defaultTargets[idx]
                });
            }

            // 4. 生成题目
            var questions = [];
            var typeLabels = {
                'fill': '📝 填空题',
                'choice': '🔘 选择题',
                'translate': '🌐 翻译题'
            };

            for (var i = 0; i < selected.length; i++) {
                var item = selected[i];
                var text = item.sentence;
                var target = item.target;

                // 随机选择题型
                var types = ['fill', 'choice', 'translate'];
                var type = types[Math.floor(Math.random() * types.length)];

                // 优先保证多样性：交替题型
                if (i > 0 && questions[i - 1]) {
                    var prevType = questions[i - 1].type;
                    var available = [];
                    for (var t = 0; t < types.length; t++) {
                        if (types[t] !== prevType) available.push(types[t]);
                    }
                    if (available.length > 0) {
                        type = available[Math.floor(Math.random() * available.length)];
                    }
                }

                var question = {
                    id: 'q_' + i + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    type: type,
                    typeLabel: typeLabels[type] || '📝 填空题',
                    originalText: text,
                    target: target,
                    userAnswer: null,
                    isCorrect: null,
                    answered: false,
                };

                if (type === 'fill') {
                    // 填空题：把目标词替换为空白
                    var displayText = text.replace(new RegExp('\\b' + target + '\\b', 'gi'), '______');
                    if (displayText === text) {
                        displayText = text.replace(new RegExp('\\b' + target.charAt(0).toUpperCase() + target.slice(1) +
                            '\\b', 'g'), '______');
                    }
                    if (displayText === text) {
                        displayText = text + ' (____' + target + '____)';
                    }
                    question.text = displayText;
                    question.answer = target;
                    question.options = [];
                } else if (type === 'choice') {
                    var meaning = AI_DICTIONARY[target] || target;
                    var distractors = aiGenerateDistractors(target, 3);
                    var options = [meaning];
                    for (var d = 0; d < distractors.length; d++) {
                        var distractorMeaning = AI_DICTIONARY[distractors[d]] || distractors[d];
                        options.push(distractorMeaning);
                    }
                    options.sort(function () { return Math.random() - 0.5; });
                    question.text = '单词 "' + target + '" 的中文意思是？';
                    question.answer = meaning;
                    question.options = options;
                } else if (type === 'translate') {
                    // 翻译题：简单处理，拼接词义
                    var words = text.match(/\b[a-zA-Z']+\b/g) || [];
                    var meanings = [];
                    for (var w = 0; w < words.length && meanings.length < 5; w++) {
                        var m = AI_DICTIONARY[words[w].toLowerCase()];
                        if (m) meanings.push(m);
                    }
                    var trans = meanings.length > 0 ? meanings.join(' ') : '(翻译参考)';
                    question.text = '请将以下句子翻译成中文：';
                    question.answer = trans;
                    question.options = [];
                }

                questions.push(question);
            }

            return questions;
        }

        // ============================================================
        // AI 评分
        // ============================================================
        function aiScoreQuestion(q, userAnswer) {
            if (!q || !userAnswer) {
                return { score: 0, feedback: '请先作答', isCorrect: false };
            }

            var correct = false;
            var feedback = '';

            if (q.type === 'fill') {
                var user = userAnswer.trim().toLowerCase();
                var answer = q.answer.trim().toLowerCase();
                correct = user === answer;
                feedback = correct ? '✅ 回答正确！' : '❌ 回答有误。正确答案是: ' + q.answer;
            } else if (q.type === 'choice') {
                correct = userAnswer === q.answer;
                feedback = correct ? '✅ 选择正确！' : '❌ 选择有误。正确答案是: ' + q.answer;
            } else if (q.type === 'translate') {
                var words = q.originalText.match(/\b[a-zA-Z']+\b/g) || [];
                var matched = 0;
                for (var i = 0; i < words.length; i++) {
                    if (userAnswer.toLowerCase().indexOf(words[i].toLowerCase()) !== -1) {
                        matched++;
                    }
                }
                var ratio = words.length > 0 ? matched / words.length : 0;
                if (ratio >= 0.7) {
                    correct = true;
                    feedback = '✅ 翻译基本正确！';
                } else if (ratio >= 0.3) {
                    correct = false;
                    feedback = '⚠️ 翻译部分正确，建议参考: ' + q.answer;
                } else {
                    correct = false;
                    feedback = '❌ 翻译有误。参考: ' + q.answer;
                }
            } else {
                feedback = '未知题型';
            }

            return { score: correct ? 1 : 0, feedback: feedback, isCorrect: correct };
        }

        // ============================================================
        // 渲染题目卡片
        // ============================================================
        function renderAIQuestion() {
            if (aiState.questions.length === 0) return '';

            var q = aiState.questions[aiState.currentIndex];
            if (!q) return '<div style="text-align:center;padding:20px;color:#999;">题目加载失败</div>';

            var html = '';
            html += '<div class="ai-question-card">';

            // 进度
            html += '<div class="q-progress">';
            html += '<span>第 ' + (aiState.currentIndex + 1) + ' / ' + aiState.questions.length + ' 题</span>';
            html += '<span>已答: ' + aiState.totalAnswered + ' 题</span>';
            html += '</div>';

            // 题型标签
            var typeClasses = { 'fill': 'fill', 'choice': 'choice', 'translate': 'translate' };
            html += '<span class="q-type-badge ' + (typeClasses[q.type] || 'fill') + '">' + (q.typeLabel || '📝 填空题') +
                '</span>';

            // 题目文字
            html += '<div class="q-text">' + q.text + '</div>';

            // 根据题型渲染
            if (q.type === 'fill') {
                html += '<div class="ai-fill-row">';
                html += '<input type="text" id="aiFillInput" placeholder="输入单词..." />';
                html += '<button onclick="aiCheckFill()">✅ 检查</button>';

                html += '<div class="ai-options" id="aiChoiceOptions">';
                var labels = ['A', 'B', 'C', 'D'];
                for (var i = 0; i < q.options.length; i++) {
                    var opt = q.options[i];
                    html += '<div class="opt" data-value="' + opt.replace(/"/g, '&quot;') +
                        '" onclick="aiSelectChoice(this)">';
                    html += '<span class="label">' + labels[i] + '.</span>';
                    html += '<span>' + opt + '</span>';
                    html += '</div>';
                }
                html += '</div>';
            } else if (q.type === 'translate') {
                html += '<div class="q-original">' + q.originalText + '</div>';
                html += '<div class="ai-fill-row">';
                html += '<input type="text" id="aiTranslateInput" placeholder="输入中文翻译..." />';
                html += '<button onclick="aiCheckTranslate()">✅ 检查</button>';
                html += '</div>';
            }

            // 参考答案
            html += '<div class="ai-answer-reveal" id="aiAnswerReveal">';
            html += '<span class="label">📖 参考答案: </span>';
            html += '<span class="value" id="aiAnswerValue">' + q.answer + '</span>';
            html += '</div>';

            html += '</div>';

            // 导航按钮
            html += '<div class="ai-nav-row">';
            html += '<button onclick="aiPrev()">◀ 上一题</button>';
            html += '<button onclick="aiNext()">下一题 ▶</button>';
            html += '</div>';

            // 重新出题
            html += '<button class="ai-regenerate-btn" onclick="aiGenerate()">🔄 重新出题</button>';

            return html;
        }

        // ============================================================
        // AI 答题检查
        // ============================================================
        function aiCheckFill() {
            var input = document.getElementById('aiFillInput');
            if (!input) return;
            var answer = input.value.trim();
            if (!answer) { showToast('请先填写答案'); return; }

            var q = aiState.questions[aiState.currentIndex];
            if (!q || q.answered) return;

            var result = aiScoreQuestion(q, answer);
            q.userAnswer = answer;
            q.isCorrect = result.isCorrect;
            q.answered = true;
            if (result.isCorrect) aiState.score++;
            aiState.totalAnswered++;

            input.className = result.isCorrect ? 'correct' : 'wrong';
            input.disabled = true;

            document.getElementById('aiAnswerReveal').className = 'ai-answer-reveal show';
            document.getElementById('aiAnswerValue').textContent = q.answer;
            document.getElementById('aiAnswerValue').className = 'value' + (result.isCorrect ? '' : ' wrong');
            showToast(result.feedback);
            renderAIPractice();
        }

        function aiSelectChoice(el) {
            var q = aiState.questions[aiState.currentIndex];
            if (!q || q.answered) return;

            var choice = el.getAttribute('data-value');
            var result = aiScoreQuestion(q, choice);
            q.userAnswer = choice;
            q.isCorrect = result.isCorrect;
            q.answered = true;
            if (result.isCorrect) aiState.score++;
            aiState.totalAnswered++;

            var opts = document.querySelectorAll('#aiChoiceOptions .opt');
            for (var i = 0; i < opts.length; i++) {
                var val = opts[i].getAttribute('data-value');
                if (val === choice) {
                    opts[i].classList.add(result.isCorrect ? 'correct-answer' : 'wrong-answer');
                }
                if (val === q.answer) {
                    opts[i].classList.add('correct-answer');
                }
                opts[i].classList.add('disabled');
                opts[i].onclick = null;
            }

            document.getElementById('aiAnswerReveal').className = 'ai-answer-reveal show';
            document.getElementById('aiAnswerValue').textContent = q.answer;
            document.getElementById('aiAnswerValue').className = 'value' + (result.isCorrect ? '' : ' wrong');
            showToast(result.feedback);
        }

        function aiCheckTranslate() {
            var input = document.getElementById('aiTranslateInput');
            if (!input) return;
            var answer = input.value.trim();
            if (!answer) { showToast('请先输入翻译'); return; }

            var q = aiState.questions[aiState.currentIndex];
            if (!q || q.answered) return;

            var result = aiScoreQuestion(q, answer);
            q.userAnswer = answer;
            q.isCorrect = result.isCorrect;
            q.answered = true;
            if (result.isCorrect) aiState.score++;
            aiState.totalAnswered++;

            input.className = result.isCorrect ? 'correct' : 'wrong';
            input.disabled = true;

            document.getElementById('aiAnswerReveal').className = 'ai-answer-reveal show';
            document.getElementById('aiAnswerValue').textContent = q.answer;
            document.getElementById('aiAnswerValue').className = 'value' + (result.isCorrect ? '' : ' wrong');
            showToast(result.feedback);
        }

        function aiNext() {
            if (aiState.currentIndex < aiState.questions.length - 1) {
                aiState.currentIndex++;
                renderAIPractice();
            } else {
                var total = aiState.questions.length;
                var correct = aiState.score;
                var percent = total > 0 ? Math.round((correct / total) * 100) : 0;
                var msg = '📊 答题完成！\n\n✅ 正确: ' + correct + ' 题\n❌ 错误: ' + (total - correct) + ' 题\n📈 正确率: ' +
                    percent + '%';
                alert(msg);
                showToast('🎉 全部完成！正确率 ' + percent + '%');
            }
        }

        function aiPrev() {
            if (aiState.currentIndex > 0) {
                aiState.currentIndex--;
                renderAIPractice();
            } else {
                showToast('已经是第一题了');
            }
        }

        // ============================================================
        // Tab切换
        // ============================================================
        function switchTab(tab) {
            currentTab = tab;
            var items = document.querySelectorAll('.bottom-nav .nav-item');
            for (var i = 0; i < items.length; i++) { items[i].classList.remove('active'); }
            var map = { home: 0, vocab: 1, write: 2, stats: 3, ai: 4 };
            if (map[tab] !== undefined && items[map[tab]]) { items[map[tab]].classList.add('active'); }

            var contentContainer = document.getElementById('contentContainer');
            var dbSelector = document.querySelector('.db-selector');

            if (tab === 'home') {
                dbSelector.style.display = 'block';
                if (state.sentences.length > 0) {
                    contentContainer.innerHTML =
                        '<div class="sentence-container" id="sentenceContainer"><div class="sentence-wrapper" id="sentenceWrapper"></div></div>' +
                        '<div class="player-controls" id="playerControls">' +
                        '<div class="top-row"><div class="progress-info"><span class="current" id="currentIndex">0</span> / <span id="totalCount">0</span></div>' +
                        '<div class="auto-toggle"><span>🔁 自动朗读</span><input type="checkbox" id="autoPlayToggle" checked></div></div>' +
                        '<div class="btn-group"><button class="icon-btn" onclick="goToPrev()">◀</button><button class="primary" id="playBtn" onclick="togglePlay()">▶ 朗读</button><button class="icon-btn" onclick="goToNext()">▶</button><button class="icon-btn" onclick="stopReading()" style="color:#e74c3c;">⏹</button></div></div>';
                    var autoToggle = document.getElementById('autoPlayToggle');
                    if (autoToggle) {
                        autoToggle.addEventListener('change', function () {
                            autoPlay = this.checked;
                            showToast(autoPlay ? '🔁 自动朗读已开启' : '🔁 自动朗读已关闭');
                        });
                    }
                    var pauseInput = document.getElementById('sentencePause');
                    if (pauseInput) {
                        pauseInput.addEventListener('input', function () {
                            document.getElementById('sentencePauseValue').textContent = this.value;
                        });
                    }
                    var wrapper = document.getElementById('sentenceWrapper');
                    if (wrapper) {
                        var html = '';
                        for (var i = 0; i < state.sentences.length; i++) {
                            var block = document.getElementById('block-' + i);
                            if (block) { html += block.outerHTML; }
                        }
                        if (html) { wrapper.innerHTML = html; }
                    }
                    goToSentence(currentIndex);
                    updatePlayerControls();
                } else {
                    contentContainer.innerHTML =
                        '<div class="sentence-container" id="sentenceContainer"><div class="sentence-wrapper" id="sentenceWrapper"><div style="text-align:center;padding:60px 20px;color:#999;">请先加载学习内容</div></div></div>' +
                        '<div class="player-controls" id="playerControls"><div class="top-row"><div class="progress-info"><span class="current" id="currentIndex">0</span> / <span id="totalCount">0</span></div><div class="auto-toggle"><span>🔁 自动朗读</span><input type="checkbox" id="autoPlayToggle" checked></div></div><div class="btn-group"><button class="icon-btn" onclick="goToPrev()">◀</button><button class="primary" id="playBtn" onclick="togglePlay()" disabled>▶ 朗读</button><button class="icon-btn" onclick="goToNext()">▶</button><button class="icon-btn" onclick="stopReading()" style="color:#e74c3c;">⏹</button></div></div>';
                }
            } else if (tab === 'vocab') {
                dbSelector.style.display = 'none';
                renderVocab();
            } else if (tab === 'write') {
                dbSelector.style.display = 'none';
                renderWrite();
            } else if (tab === 'stats') {
                dbSelector.style.display = 'none';
                renderStats();
            } else if (tab === 'ai') {
                dbSelector.style.display = 'none';
            renderAIPractice();
        } 
}

        // ============================================================
        // 设置面板
        // ============================================================
        function openSettings() {
            document.getElementById('settingsPanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function testApi() {
            var source = document.getElementById('apiSource').value;
            var indicator = document.getElementById('apiStatusIndicator');
            indicator.className = 'api-status checking';
            document.getElementById('deepseekConfig').classList.toggle('hidden', source !== 'deepseek');
            if (source === 'local') { indicator.className = 'api-status online'; return; }
            if (source === 'freedictionary') {
                fetch('https://api.dictionaryapi.dev/api/v2/entries/en/hello')
                    .then(function (r) { indicator.className = r.ok ? 'api-status online' : 'api-status offline'; })
                    .catch(function () { indicator.className = 'api-status offline'; });
            }
            if (source === 'deepseek') {
                var key = document.getElementById('deepseekKey') ? document.getElementById('deepseekKey').value.trim() :
                    '';
                indicator.className = key ? 'api-status online' : 'api-status offline';
            }
        }

        function initVoices() {
            return new Promise(function (resolve) {
                function loadVoices() {
                    var allVoices = synth.getVoices();
                    state.voices = [];
                    for (var i = 0; i < allVoices.length; i++) {
                        var v = allVoices[i];
                        if (v.lang.startsWith('en-US') || v.lang.startsWith('en-GB')) { state.voices.push(v); }
                    }
                    if (state.voices.length === 0) { state.voices = allVoices; }
                    var select = document.getElementById('defaultVoice');
                    if (select) {
                        select.innerHTML = '<option value="auto">自动选择</option>';
                        for (var vi = 0; vi < state.voices.length; vi++) {
                            var v = state.voices[vi];
                            var opt = document.createElement('option');
                            opt.value = v.name;
                            var label = v.lang.startsWith('en-US') ? '🇺🇸' : '🇬🇧';
                            opt.textContent = label + ' ' + v.name.replace(/Microsoft |Google /g, '');
                            select.appendChild(opt);
                        }
                    }
                    resolve(state.voices);
                }
                if (synth.getVoices().length > 0) { loadVoices(); } else {
                    synth.onvoiceschanged = loadVoices;
                    setTimeout(loadVoices, 1000);
                }
            });
        }

        // ============================================================
        // 数据导出
        // ============================================================
        function exportData() {
            var data = {
                vocabulary: state.vocabulary,
                learned: state.learned,
                checkinDays: state.checkinDays,
                lastCheckinDate: state.lastCheckinDate,
                exportDate: new Date().toISOString()
            };
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'english_learning_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 数据导出成功');
        }

        function clearAllData() {
            if (!confirm('⚠️ 确认清空所有数据吗？')) return;
            state.vocabulary = [];
            state.learned = [];
            state.checkinDays = 0;
            state.todayChecked = false;
            state.lastCheckinDate = null;
            localStorage.removeItem('english_state');
            localStorage.removeItem('sentenceHistory');
            saveState();
            updateCheckinUI();
            updateStats();
            showToast('✅ 数据已清空');
        }

        // ============================================================
        // 状态持久化
        // ============================================================
        function saveState() {
            try {
                localStorage.setItem('english_state', JSON.stringify({
                    learned: state.learned || [],
                    vocabulary: state.vocabulary || [],
                    checkinDays: state.checkinDays || 0,
                    lastCheckinDate: state.lastCheckinDate || null,
                    todayChecked: state.todayChecked || false,
                }));
            } catch (e) { /* ignore */ }
        }

        function loadState() {
            try {
                var data = JSON.parse(localStorage.getItem('english_state') || '{}');
                state.learned = data.learned || [];
                state.vocabulary = data.vocabulary || [];
                state.checkinDays = data.checkinDays || 0;
                state.lastCheckinDate = data.lastCheckinDate || null;
                var today = new Date().toISOString().slice(0, 10);
                state.todayChecked = state.lastCheckinDate === today;
            } catch (e) { /* ignore */ }
        }

        var toastTimer = null;

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2000);
        }

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            loadState();
            updateCheckinUI();
            updateStats();
            updateDictSize();
            updateHighlightColor();

            document.getElementById('autoPlayToggle').addEventListener('change', function () {
                autoPlay = this.checked;
                showToast(autoPlay ? '🔁 自动朗读已开启' : '🔁 自动朗读已关闭');
            });
            document.getElementById('sentencePause').addEventListener('input', function () {
                document.getElementById('sentencePauseValue').textContent = this.value;
            });

            initVoices().then(function () { console.log('🗣️ 语音初始化完成'); });
            testApi();

            var apiSource = document.getElementById('apiSource');
            if (apiSource) { apiSource.addEventListener('change', testApi); }
            var apiInput = document.getElementById('apiWordInput');
            if (apiInput) {
                apiInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') queryWordUI(); });
            }

            setInterval(saveState, 10000);
            window.addEventListener('beforeunload', saveState);

            loadDBTextbooks();
            var total = typeof meaningDictionary !== 'undefined' ? Object.keys(meaningDictionary).length : 0;
            console.log('📚 英语智能学习系统已启动');
            console.log('📝 词义词典: ' + total + ' 个单词');
            console.log('🔗 数据源: ' + getApiSource());
            console.log('📱 独立一屏模式已启用，支持滑动切换');
            console.log('🎙️ 语音转文字模块已加载，支持录音和上传文件');
            console.log('🤖 AI智能出题模块已加载（基于课文内容生成）');
        }

        document.addEventListener('DOMContentLoaded', init);
